<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch and Feast</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #303030;
  color: #fff;
  padding: 20px;
}

.container {
  max-width: 850px;
  margin: auto;
}

h1,
h2 {
  text-align: center;
}

button,
select,
input,
textarea {
  font-family: inherit;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #272EF5;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2795F5;
}

input,
select,
textarea {
  border: none;
  border-radius: 10px;
  padding: 10px;
  box-sizing: border-box;
}

#loginBox,
#menuBox,
.app-panel {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

#loginBox input {
  display: block;
  width: 100%;
  margin-top: 10px;
  font-size: 16px;
}

#loginError {
  color: #ff7777;
  white-space: pre-wrap;
}

.user-info,
.status {
  color: #aaa;
  text-align: center;
  margin: 12px 0;
  word-break: break-word;
  white-space: pre-wrap;
}

.status:empty {
  display: none;
}

.error {
  color: #ff7777;
}

.top-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.top-actions button {
  margin-top: 0;
}

.back-button,
.logout-button {
  background: #444;
}

.back-button:hover,
.logout-button:hover {
  background: #555;
}

.menu-grid {
  display: grid;
  gap: 15px;
  margin-top: 20px;
}

.menu-grid button {
  font-size: 20px;
  padding: 18px;
}



/* Serien & Filme */

.random-movie-button {
  margin-top: 0;
  margin-bottom: 10px;
}

.movie-item {
  margin: 8px 0;
  padding: 10px;
  background: #2a2a2a;
  border-radius: 8px;
}

.movie-item-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.movie-left {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.movie-left label {
  word-break: break-word;
}

input[type="checkbox"] {
  transform: scale(1.2);
  cursor: pointer;
}

.movie-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.btn-small {
  position: relative;
  background: #444;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  user-select: none;
}

.btn-small:hover {
  background: #555;
}

.btn-small.has-comment::after,
.btn-small.has-link::after {
  content: "";
  position: absolute;
  top: 2px;
  right: 2px;
  width: 8px;
  height: 8px;
  background: Blue;
  border-radius: 50%;
}

.movie-comment,
.movie-link-input {
  margin-top: 8px;
  padding: 8px;
  border-radius: 6px;
  border: none;
  width: 100%;
  display: none;
  box-sizing: border-box;
}

.movie-comment.visible,
.movie-link-input.visible {
  display: block;
}

.movie-add-section {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

.movie-add-section input {
  flex: 1;
}

.movie-add-section button {
  width: auto;
  min-width: 48px;
  margin-top: 0;
}

.progress {
  margin-top: 20px;
  text-align: center;
}

/* Kartenlisten: Feast Table, Bier, Cocktail */

.random-card-button {
  margin-top: 0;
  margin-bottom: 10px;
}

.card-controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.card-controls select {
  flex: 1;
  min-width: 180px;
}

.card-item {
  background: #2a2a2a;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.card-item-header {
  display: flex;
  gap: 15px;
  align-items: stretch;
}

.card-content {
  flex: 1;
  min-width: 0;
}

.image-wrapper {
  width: 180px;
  aspect-ratio: 16 / 9;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: 12px;
  background: #111;
}

.image {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 0;
  cursor: pointer;
}

.image.no-url {
  cursor: zoom-in;
}

.card-title {
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 10px;
  word-break: break-word;
}

.card-actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}

.btn-link { background: #2c2c2c; }
.btn-img { background: #1f3b5c; }
.btn-note { background: #4a3b1f; }
.btn-del { background: #5c1f1f; }

.btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.2);
}

.btn:active {
  transform: scale(0.95);
}

.card-comment,
.card-url-input {
  display: none;
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #333;
  color: white;
  box-sizing: border-box;
}

.card-comment {
  resize: vertical;
  min-height: 100px;
}

.card-comment.visible,
.card-url-input.visible {
  display: block;
}

.star {
  opacity: 0.3;
  cursor: pointer;
  font-size: 22px;
}

.star.active {
  opacity: 1;
}

.card-add-form {
  margin-top: 15px;
  display: grid;
  gap: 10px;
}

.card-add-form input {
  width: 100%;
}


/* Bier-Notenskala */

.beer-add-rating-input {
  width: 100%;
}

.beer-grade-wrapper {
  margin-top: 14px;
  background: #202020;
  padding: 12px;
  border-radius: 12px;
}

.beer-grade-label {
  font-weight: bold;
  margin-bottom: 10px;
  text-align: center;
}

.beer-grade-inputs {
  display: grid;
  grid-template-columns: 1fr 92px;
  gap: 10px;
  align-items: center;
}

.beer-grade-slider {
  width: 100%;
  accent-color: #272EF5;
}

.beer-grade-number {
  width: 100%;
  text-align: center;
  background: #333;
  color: white;
}

.beer-grade-scale-labels {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  margin-top: 8px;
  font-size: 11px;
  color: #bbb;
  text-align: center;
}


/* Spiele */

.games-column-form,
.games-add-form {
  margin-top: 15px;
  display: grid;
  gap: 10px;
}

.games-column-form input,
.games-add-form input {
  width: 100%;
}

.games-table-wrapper {
  margin-top: 18px;
  overflow-x: auto;
  border-radius: 16px;
}

.games-table {
  width: 100%;
  min-width: 720px;
  border-collapse: separate;
  border-spacing: 0 8px;
}

.games-table th,
.games-table td {
  background: #2a2a2a;
  padding: 10px;
  vertical-align: middle;
  text-align: center;
}

.games-table th:first-child,
.games-table td:first-child {
  text-align: left;
  min-width: 280px;
}

.games-table th:first-child {
  border-radius: 12px 0 0 12px;
}

.games-table th:last-child {
  border-radius: 0 12px 12px 0;
}

.games-table tbody tr td:first-child {
  border-radius: 12px 0 0 12px;
}

.games-table tbody tr td:last-child {
  border-radius: 0 12px 12px 0;
}

.game-row-main {
  display: flex;
  align-items: center;
  gap: 12px;
}

.game-image-wrapper {
  width: 130px;
  aspect-ratio: 16 / 9;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: 12px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
}

.game-image {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

.game-image-placeholder {
  color: #777;
  font-size: 28px;
}

.game-info {
  min-width: 0;
}

.game-name {
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  word-break: break-word;
}

.game-url {
  margin-top: 4px;
  font-size: 12px;
  color: #bbb;
  word-break: break-all;
}

.game-row-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.game-column-header {
  display: grid;
  gap: 8px;
  justify-items: center;
}

.game-column-title {
  font-weight: bold;
  word-break: break-word;
}

.game-column-actions,
.games-column-toolbar {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.games-column-toolbar {
  margin-top: 10px;
}

.game-column-move,
.game-column-sort,
.game-row-delete,
.game-row-link {
  width: auto;
  margin-top: 0;
  padding: 6px 9px;
  border-radius: 8px;
  font-size: 13px;
}

.game-column-move,
.game-column-sort,
.game-row-link {
  background: #2c2c2c;
}

.game-column-move:hover,
.game-column-sort:hover,
.game-row-link:hover {
  background: #444;
}

.game-column-move:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  filter: none;
}

.game-row-delete {
  background: #5c1f1f;
}

.game-row-delete:hover {
  background: #7a2929;
}

.game-check {
  transform: scale(1.35);
}

.games-empty {
  color: #bbb;
  text-align: center;
  padding: 16px;
}

/* Zufalls-Popup */

.popup-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.75);
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.popup-box {
  background: #1e1e1e;
  color: white;
  padding: 30px;
  border-radius: 18px;
  max-width: 420px;
  width: calc(100% - 40px);
  text-align: center;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
}

.popup-box p {
  font-size: 24px;
  font-weight: bold;
  margin: 0 0 20px 0;
}

.popup-actions {
  display: grid;
  gap: 10px;
}

.popup-actions button {
  margin-top: 0;
}

@media (max-width: 650px) {
  .top-actions {
    flex-direction: column;
  }

  .card-item-header {
    flex-direction: column;
  }

  .image-wrapper {
    width: 100%;
    aspect-ratio: 16 / 9;
  }

  .image {
    height: 100%;
  }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">
  <h1>📚 Watch and Feast</h1>

  <!-- Login -->
  <div id="loginBox">
    <h2>Login</h2>

    <input
      type="email"
      id="email"
      placeholder="E-Mail"
      autocomplete="email"
    >

    <input
      type="password"
      id="password"
      placeholder="Passwort"
      autocomplete="current-password"
    >

    <button onclick="login()">Einloggen</button>

    <p id="loginError"></p>
  </div>

  <!-- App -->
  <div id="appShell" style="display:none;">
    <div id="userInfo" class="user-info"></div>

    <div class="top-actions">
      <button class="back-button" onclick="showMenu()">🏠 Menü</button>
      <button class="logout-button" onclick="logout()">Logout</button>
    </div>

    <div id="globalStatus" class="status"></div>

    <!-- Hauptmenü -->
    <div id="menuBox">
      <h2>Welche Liste möchtest du öffnen?</h2>

      <div class="menu-grid">
        <button onclick="showMoviesApp()">🎬 Serien & Filme</button>
        <button onclick="showFeastApp()">🔗 Feast Table</button>
        <button onclick="showSaufiMenu()">🍻 Saufi?</button>
        <button onclick="showGamesApp()">🎮 Spiele</button>
      </div>
    </div>

    <!-- Saufi-Menü -->
    <div id="saufiMenuBox" class="app-panel" style="display:none;">
      <h2>🍻 Saufi?</h2>

      <div class="menu-grid">
        <button onclick="showBeerApp()">🍺 Bier</button>
        <button onclick="showCocktailApp()">🍸 Cocktail</button>
      </div>
    </div>


    <!-- Spiele -->
    <div id="gamesApp" class="app-panel" style="display:none;">
      <h2>🎮 Spiele</h2>

      <div class="games-column-form">
        <input
          id="newGameColumnName"
          placeholder="Neue Spalte hinzufügen, z. B. Peter, Anna oder Koop"
        >
        <button onclick="addGameColumn()">➕ Spalte hinzufügen</button>

        <div class="games-column-toolbar">
          <button class="game-column-sort" onclick="sortGameColumns('az')">A–Z sortieren</button>
          <button class="game-column-sort" onclick="sortGameColumns('za')">Z–A sortieren</button>
        </div>
      </div>

      <div class="games-add-form">
        <input id="newGameName" placeholder="Name">
        <input id="newGameUrl" placeholder="Link">
        <button onclick="addGameItem()">➕ Spiel hinzufügen</button>
      </div>

      <div id="gamesTableWrapper" class="games-table-wrapper"></div>

      <button onclick="deleteAllGameItems()">🗑️ Alle Spiele löschen</button>
    </div>

    <!-- Serien & Filme -->
    <div id="moviesApp" class="app-panel" style="display:none;">
      <h2>🎬 Serien & Film Tracker</h2>

      <button class="random-movie-button" onclick="openRandomUncheckedMovie()">
        🎲 Zufälligen offenen Film / offene Serie wählen
      </button>

      <div class="movie-add-section">
        <input
          type="text"
          id="newMovieItem"
          placeholder="Neues hinzufügen..."
        >
        <button onclick="addMovieItem()">+</button>
      </div>

      <div id="movieList"></div>

      <div class="progress">
        <p id="movieProgressText"></p>
        <button onclick="resetMovieChecks()">Alle Haken entfernen</button>
      </div>
    </div>

    <!-- Feast Table -->
    <div id="feastApp" class="app-panel" style="display:none;">
      <h2>🔗 Feast Table</h2>

      <button class="random-card-button" onclick="openRandomUnratedCard('feast')">
        🎲 Was fressen wir?
      </button>

      <div class="card-controls">
        <select id="feastSort" onchange="renderCardItems('feast')">
          <option value="none">Sortierung</option>
          <option value="high">Bewertung ↓</option>
          <option value="low">Bewertung ↑</option>
        </select>

        <select id="feastFilter" onchange="renderCardItems('feast')">
          <option value="0">Alle Bewertungen</option>
          <option value="1">⭐ 1+</option>
          <option value="2">⭐ 2+</option>
          <option value="3">⭐ 3+</option>
          <option value="4">⭐ 4+</option>
          <option value="5">⭐ 5</option>
        </select>
      </div>

      <div class="card-add-form">
        <input id="newFeastName" placeholder="Name">
        <input id="newFeastUrl" placeholder="Link">

        <button onclick="addCardItem('feast')">➕ Hinzufügen</button>
      </div>

      <div id="feastList"></div>

      <button onclick="deleteAllCardItems('feast')">🗑️ Alles löschen</button>
    </div>

    <!-- Bier -->
    <div id="beerApp" class="app-panel" style="display:none;">
      <h2>🍺 Bier</h2>

      <div class="card-controls">
        <select id="beerSort" onchange="renderCardItems('beer')">
          <option value="none">Sortierung</option>
          <option value="best">Beste Note zuerst</option>
          <option value="worst">Schlechteste Note zuerst</option>
        </select>

        <select id="beerFilter" onchange="renderCardItems('beer')">
          <option value="all">Alle Bewertungen</option>
          <option value="unrated">Noch nicht bewertet</option>
          <option value="1">Note 1,x</option>
          <option value="2">Note 2,x</option>
          <option value="3">Note 3,x</option>
          <option value="4">Note 4,x</option>
          <option value="5">Note 5,x</option>
          <option value="6">Note 6,0</option>
        </select>
      </div>

      <div class="card-add-form">
        <input id="newBeerName" placeholder="Name">
        <input
          id="newBeerRating"
          class="beer-add-rating-input"
          placeholder="Bewertung optional, z. B. 2,6"
          inputmode="decimal"
        >

        <button onclick="addCardItem('beer')">➕ Hinzufügen</button>
      </div>

      <div id="beerList"></div>

      <button onclick="deleteAllCardItems('beer')">🗑️ Alles löschen</button>
    </div>

    <!-- Cocktail -->
    <div id="cocktailApp" class="app-panel" style="display:none;">
      <h2>🍸 Cocktail</h2>

      <button class="random-card-button" onclick="openRandomUnratedCard('cocktail')">
        🎲 Was trinken wir?
      </button>

      <div class="card-controls">
        <select id="cocktailSort" onchange="renderCardItems('cocktail')">
          <option value="none">Sortierung</option>
          <option value="high">Bewertung ↓</option>
          <option value="low">Bewertung ↑</option>
        </select>

        <select id="cocktailFilter" onchange="renderCardItems('cocktail')">
          <option value="0">Alle Bewertungen</option>
          <option value="1">⭐ 1+</option>
          <option value="2">⭐ 2+</option>
          <option value="3">⭐ 3+</option>
          <option value="4">⭐ 4+</option>
          <option value="5">⭐ 5</option>
        </select>
      </div>

      <div class="card-add-form">
        <input id="newCocktailName" placeholder="Name">
        <input id="newCocktailUrl" placeholder="Link">

        <button onclick="addCardItem('cocktail')">➕ Hinzufügen</button>
      </div>

      <div id="cocktailList"></div>

      <button onclick="deleteAllCardItems('cocktail')">🗑️ Alles löschen</button>
    </div>
  </div>
</div>

<!-- Mittiges Zufalls-Popup -->
<div
  id="randomPopup"
  class="popup-overlay"
  style="display: none;"
  onclick="closeRandomPopupOnOverlay(event)"
>
  <div class="popup-box">
    <p id="randomPopupText"></p>

    <div class="popup-actions">
      <button
        id="randomPopupOpenBtn"
        onclick="openPendingRandomUrl()"
        style="display: none;"
      >
        Link öffnen
      </button>

      <button onclick="closeRandomPopup()">OK</button>
    </div>
  </div>
</div>

<script>
const supabaseUrl = "https://tqxyofqzlflnpfomslky.supabase.co";

const supabaseKey = "sb_publishable_Kw06uhbBIjKHx_C_KRhKiw_XNrYteHR";

const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

const MOVIE_TABLE = "items";

let currentUser = null;
let movieItems = [];
let pendingRandomUrl = "";

const loginBox = document.getElementById("loginBox");
const appShell = document.getElementById("appShell");
const menuBox = document.getElementById("menuBox");
const saufiMenuBox = document.getElementById("saufiMenuBox");
const moviesApp = document.getElementById("moviesApp");
const feastApp = document.getElementById("feastApp");
const beerApp = document.getElementById("beerApp");
const cocktailApp = document.getElementById("cocktailApp");
const gamesApp = document.getElementById("gamesApp");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginError = document.getElementById("loginError");
const userInfo = document.getElementById("userInfo");
const globalStatus = document.getElementById("globalStatus");

const movieList = document.getElementById("movieList");
const newMovieItemInput = document.getElementById("newMovieItem");

const gamesTableWrapper = document.getElementById("gamesTableWrapper");
const newGameColumnNameInput = document.getElementById("newGameColumnName");
const newGameNameInput = document.getElementById("newGameName");
const newGameUrlInput = document.getElementById("newGameUrl");

let gameItems = [];
let gameColumns = [];
let gameChecks = {};

const cardLists = {
  feast: {
    title: "Feast Table",
    table: "feast_items",
    items: [],
    listElement: document.getElementById("feastList"),
    sortElement: document.getElementById("feastSort"),
    filterElement: document.getElementById("feastFilter"),
    nameInput: document.getElementById("newFeastName"),
    urlInput: document.getElementById("newFeastUrl"),
    randomTextPrefix: "Wir fressen"
  },
  beer: {
    title: "Bier",
    table: "beer_items",
    items: [],
    listElement: document.getElementById("beerList"),
    sortElement: document.getElementById("beerSort"),
    filterElement: document.getElementById("beerFilter"),
    nameInput: document.getElementById("newBeerName"),
    urlInput: null,
    ratingInput: document.getElementById("newBeerRating"),
    randomTextPrefix: "Wir trinken"
  },
  cocktail: {
    title: "Cocktail",
    table: "cocktail_items",
    items: [],
    listElement: document.getElementById("cocktailList"),
    sortElement: document.getElementById("cocktailSort"),
    filterElement: document.getElementById("cocktailFilter"),
    nameInput: document.getElementById("newCocktailName"),
    urlInput: document.getElementById("newCocktailUrl"),
    randomTextPrefix: "Wir trinken"
  }
};

function setStatus(message, isError = false) {
  globalStatus.textContent = message || "";
  globalStatus.className = isError ? "status error" : "status";
}

function showSupabaseError(title, error) {
  console.error(title, error);

  alert(
    title +
    "\n\nMeldung: " + (error.message || "Unbekannter Fehler") +
    "\nCode: " + (error.code || "kein Code") +
    "\nDetails: " + (error.details || "keine Details")
  );
}

function normalize(url) {
  if (!url) return "";
  return url.startsWith("http") ? url : "https://" + url;
}

function debounce(callback, delay = 700) {
  let timeout;

  return function (...args) {
    clearTimeout(timeout);

    timeout = setTimeout(() => {
      callback(...args);
    }, delay);
  };
}

/* Serien & Filme */

async function loadMovieItems() {
  if (!currentUser) {
    showLogin();
    return;
  }

  setStatus("Lade Serien & Filme...");

  const { data, error } = await supabaseClient
    .from(MOVIE_TABLE)
    .select("id, name, comment, link, checked, created_at, user_id")
    .order("name", { ascending: true });

  if (error) {
    setStatus("Fehler beim Laden der Serien & Filme.", true);
    showSupabaseError("Fehler beim Laden der Serien & Filme", error);
    return;
  }

  movieItems = data || [];

  setStatus("");
  renderMovieItems();
}

function renderMovieItems() {
  movieList.innerHTML = "";

  let checkedCount = 0;

  movieItems.forEach((item) => {
    const div = document.createElement("div");
    div.className = "movie-item";

    const top = document.createElement("div");
    top.className = "movie-item-top";

    const left = document.createElement("div");
    left.className = "movie-left";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = item.checked === true;

    if (checkbox.checked) {
      checkedCount++;
    }

    checkbox.addEventListener("change", async () => {
      const newValue = checkbox.checked;

      const { error } = await supabaseClient
        .from(MOVIE_TABLE)
        .update({ checked: newValue })
        .eq("id", item.id);

      if (error) {
        checkbox.checked = item.checked === true;
        showSupabaseError("Fehler beim Speichern des Hakens", error);
        return;
      }

      item.checked = newValue;
      renderMovieItems();
    });

    const label = document.createElement("label");
    label.textContent = item.name || "Unbenannt";

    left.appendChild(checkbox);
    left.appendChild(label);

    const actions = document.createElement("div");
    actions.className = "movie-actions";

    const commentBtn = document.createElement("div");
    commentBtn.className = "btn-small";
    commentBtn.textContent = "💬";

    const linkBtn = document.createElement("div");
    linkBtn.className = "btn-small";
    linkBtn.textContent = "🔗";

    const deleteBtn = document.createElement("div");
    deleteBtn.className = "btn-small";
    deleteBtn.textContent = "❌";

    function updateCommentIcon() {
      if (item.comment && item.comment.trim() !== "") {
        commentBtn.classList.add("has-comment");
      } else {
        commentBtn.classList.remove("has-comment");
      }
    }

    function updateLinkIcon() {
      if (item.link && item.link.trim() !== "") {
        linkBtn.classList.add("has-link");
      } else {
        linkBtn.classList.remove("has-link");
      }
    }

    updateCommentIcon();
    updateLinkIcon();

    actions.appendChild(commentBtn);
    actions.appendChild(linkBtn);
    actions.appendChild(deleteBtn);

    top.appendChild(left);
    top.appendChild(actions);

    const comment = document.createElement("input");
    comment.className = "movie-comment";
    comment.placeholder = "Kommentar hinzufügen...";
    comment.value = item.comment || "";

    const linkInput = document.createElement("input");
    linkInput.className = "movie-link-input";
    linkInput.placeholder = "Link eingeben...";
    linkInput.value = item.link || "";

    commentBtn.onclick = () => {
      comment.classList.toggle("visible");

      if (comment.classList.contains("visible")) {
        comment.focus();
      }
    };

    linkBtn.onclick = () => {
      linkInput.classList.toggle("visible");

      if (linkInput.classList.contains("visible")) {
        linkInput.focus();
        linkInput.select();
      }
    };

    const saveCommentDebounced = debounce(async (value) => {
      const { error } = await supabaseClient
        .from(MOVIE_TABLE)
        .update({ comment: value })
        .eq("id", item.id);

      if (error) {
        showSupabaseError("Fehler beim Speichern des Kommentars", error);
      }
    });

    comment.addEventListener("input", () => {
      item.comment = comment.value;
      updateCommentIcon();
      saveCommentDebounced(comment.value);
    });

    const saveLinkDebounced = debounce(async (value) => {
      const normalizedValue = normalize(value.trim());

      const { error } = await supabaseClient
        .from(MOVIE_TABLE)
        .update({ link: normalizedValue })
        .eq("id", item.id);

      if (error) {
        showSupabaseError("Fehler beim Speichern des Links", error);
        return;
      }

      item.link = normalizedValue;
      linkInput.value = normalizedValue;
      updateLinkIcon();
    });

    linkInput.addEventListener("input", () => {
      item.link = linkInput.value;
      updateLinkIcon();
      saveLinkDebounced(linkInput.value);
    });

    deleteBtn.onclick = async () => {
      const confirmed = confirm(
        `"${item.name || "Unbenannt"}" wirklich löschen?`
      );

      if (!confirmed) return;

      const { error } = await supabaseClient
        .from(MOVIE_TABLE)
        .delete()
        .eq("id", item.id);

      if (error) {
        showSupabaseError("Fehler beim Löschen", error);
        return;
      }

      movieItems = movieItems.filter(entry => entry.id !== item.id);
      renderMovieItems();
    };

    div.appendChild(top);
    div.appendChild(comment);
    div.appendChild(linkInput);

    movieList.appendChild(div);
  });

  document.getElementById("movieProgressText").textContent =
    `Fortschritt: ${checkedCount} / ${movieItems.length}`;
}

function openRandomUncheckedMovie() {
  if (!Array.isArray(movieItems)) {
    showRandomPopup("Die Liste wurde noch nicht geladen.");
    return;
  }

  const candidates = movieItems.filter(function(item) {
    return (
      item.checked === null ||
      item.checked === undefined ||
      item.checked === false
    );
  });

  if (candidates.length === 0) {
    showRandomPopup("Es gibt keinen offenen Serien- oder Film-Eintrag mehr.");
    return;
  }

  const randomIndex = Math.floor(Math.random() * candidates.length);
  const selectedItem = candidates[randomIndex];

  const selectedName = selectedItem.name || "etwas Unbekanntes";

  const selectedUrl =
    selectedItem.link && selectedItem.link.trim() !== ""
      ? normalize(selectedItem.link.trim())
      : "";

  showRandomPopup("Wir schauen " + selectedName + "!", selectedUrl);
}

async function updateCardItem(type, id, changes, errorTitle = "Fehler beim Speichern") {

    .from(config.table)
    .update(changes)
    .eq("id", id);

  if (error) {

    return false;
  }

  return true;

function compressImage(input, callback) {
  if (typeof input === "string") {
    const img = new Image();
    img.crossOrigin = "anonymous";

    img.onload = () => {
      resizeImage(img, callback);
    };

    img.onerror = () => {
      callback("");
    };

    img.src = input;
  } else {
    const reader = new FileReader();

    reader.onload = event => {
      const img = new Image();

      img.onload = () => {
        resizeImage(img, callback);
      };

      img.onerror = () => {
        callback("");
      };

      img.src = event.target.result;
    };

    reader.readAsDataURL(input);
  }
}

function resizeImage(img, callback) {
  const canvas = document.createElement("canvas");
  const targetWidth = 800;
  const targetHeight = 450;
  const targetRatio = targetWidth / targetHeight;
  const sourceRatio = img.width / img.height;

  let sourceX = 0;
  let sourceY = 0;
  let sourceWidth = img.width;
  let sourceHeight = img.height;

  if (sourceRatio > targetRatio) {
    sourceWidth = img.height * targetRatio;
    sourceX = (img.width - sourceWidth) / 2;
  } else if (sourceRatio < targetRatio) {
    sourceHeight = img.width / targetRatio;
    sourceY = (img.height - sourceHeight) / 2;
  }

  canvas.width = targetWidth;
  canvas.height = targetHeight;

  canvas
    .getContext("2d")
    .drawImage(
      img,
      sourceX,
      sourceY,
      sourceWidth,
      sourceHeight,
      0,
      0,
      targetWidth,
      targetHeight
    );

  callback(canvas.toDataURL("image/jpeg", 0.75));
}

function autoImage(type, url, itemId) {
  if (!url) return;

  const config = cardLists[type];

  const api =
    "https://api.microlink.io/?url=" + encodeURIComponent(url);

  fetch(api)
    .then(response => response.json())
    .then(data => {
      const imageUrl =
        data?.data?.image?.url ||
        new URL(url).origin + "/favicon.ico";

      compressImage(imageUrl, async compressed => {
        if (!compressed) return;

        const item = config.items.find(entry => entry.id === itemId);

        if (!item || item.image) return;

        item.image = compressed;

        const success = await updateCardItem(
          type,
          item.id,
          { image: compressed },
          "Fehler beim Speichern des Vorschaubilds"
        );

        if (success) {
          renderCardItems(type);
        }
      });
    })
    .catch(error => {
      console.warn("Automatisches Bild konnte nicht geladen werden:", error);
    });
}

function renderCardItems(type) {
  const config = cardLists[type];

  config.listElement.innerHTML = "";

  let data = [...config.items];
  const sort = config.sortElement.value;

  if (type === "beer") {
    const filter = config.filterElement.value;

    data = data.filter(item => {
      const rating = Number(item.rating || 0);

      if (filter === "all") {
        return true;
      }

      if (filter === "unrated") {
        return rating === 0;
      }

      if (filter === "6") {
        return rating === 6;
      }

      const grade = Number(filter);
      return rating >= grade && rating < grade + 1;
    });

    if (sort === "best") {
      data.sort((a, b) => {
        const aRating = Number(a.rating || 0);
        const bRating = Number(b.rating || 0);

        const aValue = aRating === 0 ? 99 : aRating;
        const bValue = bRating === 0 ? 99 : bRating;

        return aValue - bValue;
      });
    } else if (sort === "worst") {
      data.sort((a, b) => {
        const aRating = Number(a.rating || 0);
        const bRating = Number(b.rating || 0);

        const aValue = aRating === 0 ? -1 : aRating;
        const bValue = bRating === 0 ? -1 : bRating;

        return bValue - aValue;
      });
    }
  } else {
    const filter = Number(config.filterElement.value);

    data = data.filter(item => (item.rating || 0) >= filter);

    if (sort === "high") {
      data.sort((a, b) => (b.rating || 0) - (a.rating || 0));
    } else if (sort === "low") {
      data.sort((a, b) => (a.rating || 0) - (b.rating || 0));
    }
  }

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card-item";

    const header = document.createElement("div");
    header.className = "card-item-header";

    if (item.image) {
      const imgWrap = document.createElement("div");
      imgWrap.className = "image-wrapper";

      const img = document.createElement("img");
      img.src = item.image;
      img.className = item.url ? "image" : "image no-url";
      img.alt = item.name ? "Vorschaubild von " + item.name : "Vorschaubild";

      img.onclick = () => {
        if (item.url) {
          window.open(item.url, "_blank");
        } else if (item.image) {
          window.open(item.image, "_blank");
        }
      };

      imgWrap.appendChild(img);
      header.appendChild(imgWrap);
    }

    const content = document.createElement("div");
    content.className = "card-content";

    const title = document.createElement("div");
    title.className = "card-title";
    title.textContent = item.name || "Unbenannt";

    title.onclick = () => {
      if (item.url) {
        window.open(item.url, "_blank");
      }
    };

    const linkInput = document.createElement("input");
    linkInput.className = "card-url-input";
    linkInput.value = item.url || "";
    linkInput.placeholder = "Link bearbeiten...";

    const saveLinkDebounced = debounce(async value => {
      const normalizedUrl = normalize(value.trim());

      item.url = normalizedUrl;

      const success = await updateCardItem(
        type,
        item.id,
        { url: normalizedUrl },
        "Fehler beim Speichern des Links"
      );

      if (success) {
        linkInput.value = normalizedUrl;
      }
    });

    linkInput.addEventListener("input", () => {
      saveLinkDebounced(linkInput.value);
    });

    const actions = document.createElement("div");
    actions.className = "card-actions";

    const imgBtn = createCardButton("🖼️", "btn btn-img");
    const noteBtn = createCardButton("📝", "btn btn-note");
    const delBtn = createCardButton("❌", "btn btn-del");

    if (type !== "beer") {
      const linkBtn = createCardButton("🔗", "btn btn-link");

      linkBtn.onclick = () => {
        linkInput.classList.toggle("visible");

        if (linkInput.classList.contains("visible")) {
          linkInput.focus();
          linkInput.select();
        }
      };

      actions.appendChild(linkBtn);
    }

    const comment = document.createElement("textarea");
    comment.className = "card-comment";
    comment.value = item.comment || "";
    comment.placeholder = "Kommentar hinzufügen...";

    noteBtn.onclick = () => {
      comment.classList.toggle("visible");

      if (comment.classList.contains("visible")) {
        comment.focus();
      }
    };

    const saveCommentDebounced = debounce(async value => {
      item.comment = value;

      await updateCardItem(
        type,
        item.id,
        { comment: value },
        "Fehler beim Speichern des Kommentars"
      );
    });

    comment.addEventListener("input", () => {
      saveCommentDebounced(comment.value);
    });

    imgBtn.onclick = () => {
      const file = document.createElement("input");
      file.type = "file";
      file.accept = "image/*";

      file.onchange = event => {
        const selected = event.target.files[0];

        if (!selected) return;

        compressImage(selected, async compressed => {
          if (!compressed) {
            alert("Bild konnte nicht verarbeitet werden.");
            return;
          }

          item.image = compressed;

          const success = await updateCardItem(
            type,
            item.id,
            { image: compressed },
            "Fehler beim Speichern des Bildes"
          );

          if (success) {
            renderCardItems(type);
          }
        });
      };

      file.click();
    };

    delBtn.onclick = async () => {
      if (!confirm("Eintrag löschen?")) return;

      const { error } = await supabaseClient
        .from(config.table)
        .delete()
        .eq("id", item.id);

      if (error) {
        showSupabaseError("Fehler beim Löschen", error);
        return;
      }

      config.items = config.items.filter(entry => entry.id !== item.id);
      renderCardItems(type);
    };

    actions.append(imgBtn, noteBtn, delBtn);

    content.appendChild(title);
    content.appendChild(actions);

    if (type === "beer") {
      content.appendChild(createBeerGradeSlider(item, type));
    } else {
      const stars = document.createElement("div");

      for (let s = 1; s <= 5; s++) {
        const star = document.createElement("span");
        star.textContent = "⭐";
        star.className = "star";

        if ((item.rating || 0) >= s) {
          star.classList.add("active");
        }

        star.onclick = async () => {
          item.rating = s;

          const success = await updateCardItem(
            type,
            item.id,
            { rating: s },
            "Fehler beim Speichern der Bewertung"
          );

          if (success) {
            renderCardItems(type);
          }
        };

        stars.appendChild(star);
      }

      content.appendChild(stars);
    }

    if (type !== "beer") {
      content.appendChild(linkInput);
    }

    content.appendChild(comment);

    header.appendChild(content);
    div.appendChild(header);

    config.listElement.appendChild(div);
  });
}

function parseBeerRatingInput(value) {
  const cleaned = String(value || "").trim();

  if (!cleaned) {
    return 0;
  }

  const rating = Number(cleaned.replace(",", "."));

  if (!Number.isFinite(rating)) {
    return null;
  }

  const roundedRating = Math.round(rating * 10) / 10;

  if (roundedRating < 1 || roundedRating > 6) {
    return null;
  }

  return roundedRating;
}

function formatBeerGrade(value) {
  return Number(value).toFixed(1).replace(".", ",");
}

function getBeerGradeText(value) {
  const rating = Number(value || 0);

  if (rating === 0) return "Noch nicht bewertet";
  if (rating <= 1.3) return "Sehr gut";
  if (rating <= 1.7) return "Sehr gut minus";
  if (rating <= 2.3) return "Gut";
  if (rating <= 2.7) return "Gut minus";
  if (rating <= 3.3) return "Befriedigend";
  if (rating <= 3.7) return "Befriedigend minus";
  if (rating <= 4.3) return "Ausreichend";
  if (rating <= 4.7) return "Ausreichend minus";
  if (rating <= 5.3) return "Mangelhaft";
  if (rating <= 5.7) return "Mangelhaft minus";

  return "Ungenießbar";
}

function createBeerGradeSlider(item, type) {
  const wrapper = document.createElement("div");
  wrapper.className = "beer-grade-wrapper";

  const label = document.createElement("div");
  label.className = "beer-grade-label";

  const inputs = document.createElement("div");
  inputs.className = "beer-grade-inputs";

  const slider = document.createElement("input");
  slider.type = "range";
  slider.min = "1";
  slider.max = "6";
  slider.step = "0.1";
  slider.className = "beer-grade-slider";

  const numberInput = document.createElement("input");
  numberInput.type = "text";
  numberInput.inputMode = "decimal";
  numberInput.className = "beer-grade-number";
  numberInput.placeholder = "Note";

  const scale = document.createElement("div");
  scale.className = "beer-grade-scale-labels";
  scale.innerHTML = `
    <span>1,0<br>Sehr gut</span>
    <span>2,0<br>Gut</span>
    <span>3,0<br>Befr.</span>
    <span>4,0<br>Ausreich.</span>
    <span>5,0<br>Mangelh.</span>
    <span>6,0<br>Nein</span>
  `;

  function updateDisplay(value) {
    const rating = Number(value || 0);

    if (rating > 0) {
      label.textContent =
        "Bewertung: " +
        formatBeerGrade(rating) +
        " – " +
        getBeerGradeText(rating);

      numberInput.value = formatBeerGrade(rating);
      slider.value = rating;
    } else {
      label.textContent = "Noch nicht bewertet";
      numberInput.value = "";
      slider.value = "3";
    }
  }

  const saveGradeDebounced = debounce(async value => {
    await updateCardItem(
      type,
      item.id,
      { rating: value },
      "Fehler beim Speichern der Bier-Bewertung"
    );
  }, 500);

  function setRating(rawValue, shouldSave = true) {
    const rating = parseBeerRatingInput(rawValue);

    if (rating === null || rating === 0) {
      return;
    }

    item.rating = rating;
    updateDisplay(rating);

    if (shouldSave) {
      saveGradeDebounced(rating);
    }
  }

  slider.addEventListener("input", () => {
    setRating(slider.value);
  });

  numberInput.addEventListener("change", () => {
    setRating(numberInput.value);
  });

  const currentRating = Number(item.rating || 0);
  updateDisplay(currentRating);

  inputs.appendChild(slider);
  inputs.appendChild(numberInput);

  wrapper.appendChild(label);
  wrapper.appendChild(inputs);
  wrapper.appendChild(scale);

  return wrapper;
}

function openRandomUnratedCard(type) {
  const config = cardLists[type];

  if (!config || !Array.isArray(config.items)) {
    showRandomPopup("Die Liste wurde noch nicht geladen.");
    return;
  }

  const candidates = config.items.filter(function(item) {
    const rating = Number(item.rating || 0);
    const hasNoRating = rating === 0;

    const hasValidUrl =
      item.url &&
      item.url.trim() !== "";

    return hasNoRating && hasValidUrl;
  });

  if (candidates.length === 0) {
    showRandomPopup("Es gibt keinen unbewerteten Eintrag mit hinterlegtem Link.");
    return;
  }

  const randomIndex = Math.floor(Math.random() * candidates.length);
  const selectedItem = candidates[randomIndex];

  const selectedName = selectedItem.name || "etwas Unbekanntes";
  const selectedUrl = normalize(selectedItem.url.trim());

  showRandomPopup(config.randomTextPrefix + " " + selectedName + "!", selectedUrl);
}

/* Spiele */

function getGameCheckKey(gameId, columnId) {
  return gameId + "|" + columnId;
}

async function loadGamesData() {
  if (!currentUser) {
    showLogin();
    return;
  }

  setStatus("Lade Spiele...");

  const [itemsResult, columnsResult, checksResult] = await Promise.all([
    supabaseClient
      .from("game_items")
      .select("id, name, url, image, user_id, created_at")
      .order("created_at", { ascending: false }),

    supabaseClient
      .from("game_columns")
      .select("id, name, position, user_id, created_at")
      .order("position", { ascending: true })
      .order("created_at", { ascending: true }),

    supabaseClient
      .from("game_checks")
      .select("id, game_id, column_id, checked, user_id, created_at")
  ]);

  if (itemsResult.error) {
    setStatus("Fehler beim Laden der Spiele.", true);
    showSupabaseError("Fehler beim Laden der Spiele", itemsResult.error);
    return;
  }

  if (columnsResult.error) {
    setStatus("Fehler beim Laden der Spiele-Spalten.", true);
    showSupabaseError("Fehler beim Laden der Spiele-Spalten", columnsResult.error);
    return;
  }

  if (checksResult.error) {
    setStatus("Fehler beim Laden der Spiele-Haken.", true);
    showSupabaseError("Fehler beim Laden der Spiele-Haken", checksResult.error);
    return;
  }

  gameItems = itemsResult.data || [];
  gameColumns = columnsResult.data || [];
  gameChecks = {};

  (checksResult.data || []).forEach(check => {
    gameChecks[getGameCheckKey(check.game_id, check.column_id)] = {
      id: check.id,
      checked: check.checked === true
    };
  });

  setStatus("");
  renderGamesTable();
}

function renderGamesTable() {
  gamesTableWrapper.innerHTML = "";

  if (gameItems.length === 0 && gameColumns.length === 0) {
    const empty = document.createElement("div");
    empty.className = "games-empty";
    empty.textContent = "Noch keine Spiele und noch keine Spalten vorhanden.";
    gamesTableWrapper.appendChild(empty);
    return;
  }

  const table = document.createElement("table");
  table.className = "games-table";

  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");

  const gameHead = document.createElement("th");
  gameHead.textContent = "Spiel";
  headRow.appendChild(gameHead);

  gameColumns.forEach((column, columnIndex) => {
    const th = document.createElement("th");

    const headerWrap = document.createElement("div");
    headerWrap.className = "game-column-header";

    const title = document.createElement("div");
    title.className = "game-column-title";
    title.textContent = column.name || "Spalte";

    const actions = document.createElement("div");
    actions.className = "game-column-actions";

    const moveLeftButton = document.createElement("button");
    moveLeftButton.className = "game-column-move";
    moveLeftButton.type = "button";
    moveLeftButton.textContent = "⬅️";
    moveLeftButton.title = "Spalte nach links verschieben";
    moveLeftButton.disabled = columnIndex === 0;
    moveLeftButton.onclick = () => moveGameColumn(column.id, -1);

    const moveRightButton = document.createElement("button");
    moveRightButton.className = "game-column-move";
    moveRightButton.type = "button";
    moveRightButton.textContent = "➡️";
    moveRightButton.title = "Spalte nach rechts verschieben";
    moveRightButton.disabled = columnIndex === gameColumns.length - 1;
    moveRightButton.onclick = () => moveGameColumn(column.id, 1);

    actions.appendChild(moveLeftButton);
    actions.appendChild(moveRightButton);

    headerWrap.appendChild(title);
    headerWrap.appendChild(actions);

    th.appendChild(headerWrap);
    headRow.appendChild(th);
  });

  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");

  if (gameItems.length === 0) {
    const row = document.createElement("tr");
    const cell = document.createElement("td");
    cell.colSpan = Math.max(1, gameColumns.length + 1);
    cell.className = "games-empty";
    cell.textContent = "Noch keine Spiele vorhanden.";
    row.appendChild(cell);
    tbody.appendChild(row);
  }

  gameItems.forEach(item => {
    const row = document.createElement("tr");

    const gameCell = document.createElement("td");

    const main = document.createElement("div");
    main.className = "game-row-main";

    const imageWrapper = document.createElement("div");
    imageWrapper.className = "game-image-wrapper";

    if (item.image) {
      const img = document.createElement("img");
      img.src = item.image;
      img.className = "game-image";
      img.alt = item.name ? "Vorschaubild von " + item.name : "Vorschaubild";
      img.onclick = () => {
        if (item.url) {
          window.open(item.url, "_blank");
        } else {
          window.open(item.image, "_blank");
        }
      };
      imageWrapper.appendChild(img);
    } else {
      const placeholder = document.createElement("div");
      placeholder.className = "game-image-placeholder";
      placeholder.textContent = "🎮";
      imageWrapper.appendChild(placeholder);
    }

    const info = document.createElement("div");
    info.className = "game-info";

    const name = document.createElement("div");
    name.className = "game-name";
    name.textContent = item.name || "Unbenannt";
    name.onclick = () => {
      if (item.url) {
        window.open(item.url, "_blank");
      }
    };

    info.appendChild(name);

    if (item.url) {
      const urlText = document.createElement("div");
      urlText.className = "game-url";
      urlText.textContent = item.url;
      info.appendChild(urlText);
    }

    const rowActions = document.createElement("div");
    rowActions.className = "game-row-actions";

    if (item.url) {
      const linkButton = document.createElement("button");
      linkButton.className = "game-row-link";
      linkButton.type = "button";
      linkButton.textContent = "🔗 Öffnen";
      linkButton.onclick = () => window.open(item.url, "_blank");
      rowActions.appendChild(linkButton);
    }

    const deleteButton = document.createElement("button");
    deleteButton.className = "game-row-delete";
    deleteButton.type = "button";
    deleteButton.textContent = "❌ Löschen";
    deleteButton.onclick = () => deleteGameItem(item.id, item.name || "Unbenannt");
    rowActions.appendChild(deleteButton);

    info.appendChild(rowActions);

    main.appendChild(imageWrapper);
    main.appendChild(info);
    gameCell.appendChild(main);
    row.appendChild(gameCell);

    gameColumns.forEach(column => {
      const cell = document.createElement("td");
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.className = "game-check";

      const key = getGameCheckKey(item.id, column.id);
      checkbox.checked = gameChecks[key]?.checked === true;

      checkbox.addEventListener("change", async () => {
        const newValue = checkbox.checked;
        const success = await updateGameCheck(item.id, column.id, newValue);

        if (!success) {
          checkbox.checked = !newValue;
        }
      });

      cell.appendChild(checkbox);
      row.appendChild(cell);
    });

    tbody.appendChild(row);
  });

  table.appendChild(tbody);
  gamesTableWrapper.appendChild(table);
}

async function addGameColumn() {
  if (!currentUser) {
    showLogin();
    return;
  }

  const name = newGameColumnNameInput.value.trim();

  if (!name) {
    alert("Bitte einen Spaltennamen eingeben.");
    return;
  }

  const maxPosition = gameColumns.reduce((max, column) => {
    return Math.max(max, Number(column.position || 0));
  }, 0);

  const newColumn = {
    name,
    position: maxPosition + 1,
    user_id: currentUser.id
  };

  const { data, error } = await supabaseClient
    .from("game_columns")
    .insert(newColumn)
    .select("id, name, position, user_id, created_at")
    .single();

  if (error) {
    showSupabaseError("Fehler beim Hinzufügen der Spalte", error);
    return;
  }

  newGameColumnNameInput.value = "";

  if (data) {
    gameColumns.push(data);
    gameColumns.sort((a, b) => Number(a.position || 0) - Number(b.position || 0));
    renderGamesTable();
  } else {
    await loadGamesData();
  }
}

async function saveGameColumnPositions() {
  const updates = gameColumns.map((column, index) => {
    const newPosition = index + 1;
    column.position = newPosition;

    return supabaseClient
      .from("game_columns")
      .update({ position: newPosition })
      .eq("id", column.id);
  });

  const results = await Promise.all(updates);
  const failedResult = results.find(result => result.error);

  if (failedResult) {
    showSupabaseError("Fehler beim Speichern der Spalten-Reihenfolge", failedResult.error);
    await loadGamesData();
    return false;
  }

  return true;
}

async function moveGameColumn(columnId, direction) {
  const currentIndex = gameColumns.findIndex(column => column.id === columnId);
  const targetIndex = currentIndex + direction;

  if (
    currentIndex < 0 ||
    targetIndex < 0 ||
    targetIndex >= gameColumns.length
  ) {
    return;
  }

  const previousColumns = [...gameColumns];

  const movedColumn = gameColumns[currentIndex];
  gameColumns[currentIndex] = gameColumns[targetIndex];
  gameColumns[targetIndex] = movedColumn;

  renderGamesTable();

  const success = await saveGameColumnPositions();

  if (!success) {
    gameColumns = previousColumns;
    renderGamesTable();
  }
}

async function sortGameColumns(direction) {
  if (gameColumns.length < 2) return;

  const previousColumns = [...gameColumns];

  gameColumns.sort((a, b) => {
    const nameA = a.name || "";
    const nameB = b.name || "";
    const result = nameA.localeCompare(nameB, "de", {
      numeric: true,
      sensitivity: "base"
    });

    return direction === "za" ? -result : result;
  });

  renderGamesTable();

  const success = await saveGameColumnPositions();

  if (!success) {
    gameColumns = previousColumns;
    renderGamesTable();
  }
}


async function addGameItem() {
  if (!currentUser) {
    showLogin();
    return;
  }

  const name = newGameNameInput.value.trim();
  const url = normalize(newGameUrlInput.value.trim());

  if (!name) {
    alert("Bitte einen Namen eingeben.");
    return;
  }

  const newItem = {
    name,
    url,
    image: "",
    user_id: currentUser.id
  };

  const { data, error } = await supabaseClient
    .from("game_items")
    .insert(newItem)
    .select("id, name, url, image, user_id, created_at")
    .single();

  if (error) {
    showSupabaseError("Fehler beim Hinzufügen des Spiels", error);
    return;
  }

  newGameNameInput.value = "";
  newGameUrlInput.value = "";

  if (data) {
    gameItems.unshift(data);
    renderGamesTable();

    if (url) {
      autoGameImage(url, data.id);
    }
  } else {
    await loadGamesData();
  }
}

async function deleteGameItem(itemId, itemName) {
  if (!confirm('Spiel "' + itemName + '" wirklich löschen?')) {
    return;
  }

  const { error } = await supabaseClient
    .from("game_items")
    .delete()
    .eq("id", itemId);

  if (error) {
    showSupabaseError("Fehler beim Löschen des Spiels", error);
    return;
  }

  gameItems = gameItems.filter(item => item.id !== itemId);

  Object.keys(gameChecks).forEach(key => {
    if (key.startsWith(itemId + "|")) {
      delete gameChecks[key];
    }
  });

  renderGamesTable();
}

async function deleteAllGameItems() {
  if (!currentUser) {
    showLogin();
    return;
  }

  if (!confirm("Wirklich alle Spiele löschen? Die angelegten Spalten bleiben bestehen.")) return;

  const { error } = await supabaseClient
    .from("game_items")
    .delete()
    .not("id", "is", null);

  if (error) {
    showSupabaseError("Fehler beim Löschen aller Spiele", error);
    return;
  }

  gameItems = [];
  gameChecks = {};
  renderGamesTable();
}

async function updateGameCheck(gameId, columnId, checked) {
  const key = getGameCheckKey(gameId, columnId);

  const { data, error } = await supabaseClient
    .from("game_checks")
    .upsert(
      {
        game_id: gameId,
        column_id: columnId,
        checked,
        user_id: currentUser.id
      },
      { onConflict: "game_id,column_id" }
    )
    .select("id, game_id, column_id, checked")
    .single();

  if (error) {
    showSupabaseError("Fehler beim Speichern des Hakens", error);
    return false;
  }

  if (data) {
    gameChecks[key] = {
      id: data.id,
      checked: data.checked === true
    };
  } else {
    gameChecks[key] = {
      id: gameChecks[key]?.id || "",
      checked
    };
  }

  return true;
}

function autoGameImage(url, itemId) {
  if (!url) return;

  const api =
    "https://api.microlink.io/?url=" + encodeURIComponent(url);

  fetch(api)
    .then(response => response.json())
    .then(data => {
      const imageUrl =
        data?.data?.image?.url ||
        new URL(url).origin + "/favicon.ico";

      compressImage(imageUrl, async compressed => {
        if (!compressed) return;

        const item = gameItems.find(entry => entry.id === itemId);

        if (!item || item.image) return;

        item.image = compressed;

        const { error } = await supabaseClient
          .from("game_items")
          .update({ image: compressed })
          .eq("id", item.id);

        if (error) {
          showSupabaseError("Fehler beim Speichern des Spiele-Vorschaubilds", error);
          return;
        }

        renderGamesTable();
      });
    })
    .catch(error => {
      console.warn("Automatisches Spiele-Bild konnte nicht geladen werden:", error);
    });
}
