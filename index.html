<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Serien Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    h2 {
      margin-top: 0;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    #loginBox {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    #loginBox input {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    #loginError {
      color: #ff7777;
      white-space: pre-wrap;
      margin-top: 12px;
    }

    .logout-button {
      background: #444;
      margin-bottom: 15px;
    }

    .logout-button:hover {
      background: #555;
    }

    .item {
      margin: 8px 0;
      padding: 10px;
      background: #1e1e1e;
      border-radius: 8px;
    }

    .item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .left label {
      word-break: break-word;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-small {
      position: relative;
      background: #444;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      user-select: none;
    }

    .btn-small:hover {
      background: #555;
    }

    .btn-small.has-comment::after,
    .btn-small.has-link::after {
      content: "";
      position: absolute;
      top: 2px;
      right: 2px;
      width: 8px;
      height: 8px;
      background: red;
      border-radius: 50%;
    }

    .comment,
    .link-input {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      border: none;
      width: 100%;
      display: none;
      box-sizing: border-box;
      font-size: 15px;
    }

    .comment.visible,
    .link-input.visible {
      display: block;
    }

    .progress {
      margin-top: 20px;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: #ff4444;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ff6666;
    }

    .add-section {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .add-section input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    .add-section button {
      width: auto;
      min-width: 48px;
      margin-top: 0;
    }

    .status {
      text-align: center;
      margin: 12px 0;
      color: #aaa;
      white-space: pre-wrap;
    }

    .status:empty {
      display: none;
    }

    .error {
      color: #ff7777;
    }

    .user-info {
      color: #aaa;
      text-align: center;
      font-size: 14px;
      margin-bottom: 10px;
      word-break: break-word;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">
  <h1>🎬 Serien & Film Tracker</h1>

  <!-- Login-Bereich -->
  <div id="loginBox">
    <h2>Login</h2>

    <input
      type="email"
      id="email"
      placeholder="E-Mail"
      autocomplete="email"
    >

    <input
      type="password"
      id="password"
      placeholder="Passwort"
      autocomplete="current-password"
    >

    <button onclick="login()">Einloggen</button>

    <p id="loginError"></p>
  </div>

  <!-- Geschützter App-Bereich -->
  <div id="appBox" style="display: none;">
    <div id="userInfo" class="user-info"></div>

    <button class="logout-button" onclick="logout()">
      Logout
    </button>

    <div id="status" class="status">
      Verbinde mit Datenbank...
    </div>

    <div id="list"></div>

    <div class="add-section">
      <input
        type="text"
        id="newItem"
        placeholder="Neues hinzufügen..."
      >
      <button onclick="addItem()">+</button>
    </div>

    <div class="progress">
      <p id="progressText"></p>
      <button onclick="resetAll()">Alle Haken entfernen</button>
    </div>
  </div>
</div>

<script>
  const supabaseUrl = "https://tqxyofqzlflnpfomslky.supabase.co";

  const supabaseKey = "sb_publishable_Kw06uhbBIjKHx_C_KRhKiw_XNrYteHR";

  const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
  );

  let currentUser = null;
  let items = [];

  const loginBox = document.getElementById("loginBox");
  const appBox = document.getElementById("appBox");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const loginError = document.getElementById("loginError");
  const listContainer = document.getElementById("list");
  const statusElement = document.getElementById("status");
  const newItemInput = document.getElementById("newItem");
  const userInfo = document.getElementById("userInfo");

  function setStatus(message, isError = false) {
    statusElement.textContent = message || "";
    statusElement.className = isError ? "status error" : "status";
  }

  function showSupabaseError(title, error) {
    console.error(title, error);

    const message =
      title +
      "\n\n" +
      "Meldung: " + (error.message || "Unbekannter Fehler") +
      "\n" +
      "Code: " + (error.code || "kein Code") +
      "\n" +
      "Details: " + (error.details || "keine Details");

    alert(message);
  }

  function normalize(url) {
    if (!url) return "";
    return url.startsWith("http") ? url : "https://" + url;
  }

  function debounce(callback, delay = 700) {
    let timeout;

    return function (...args) {
      clearTimeout(timeout);

      timeout = setTimeout(() => {
        callback(...args);
      }, delay);
    };
  }

  function showLogin() {
    currentUser = null;
    items = [];

    loginBox.style.display = "block";
    appBox.style.display = "none";

    listContainer.innerHTML = "";
    document.getElementById("progressText").textContent = "";
    setStatus("");
    userInfo.textContent = "";
  }

  function showApp() {
    loginBox.style.display = "none";
    appBox.style.display = "block";

    if (currentUser && currentUser.email) {
      userInfo.textContent = "Eingeloggt als: " + currentUser.email;
    }
  }

  async function initAuth() {
    const { data, error } = await supabaseClient.auth.getSession();

    if (error) {
      console.error(error);
      showLogin();
      return;
    }

    if (data.session && data.session.user) {
      currentUser = data.session.user;
      showApp();
      await loadItems();
    } else {
      showLogin();
    }
  }

  async function login() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    loginError.textContent = "";

    if (!email || !password) {
      loginError.textContent = "Bitte E-Mail und Passwort eingeben.";
      return;
    }

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      loginError.textContent =
        "Login fehlgeschlagen:\n" + error.message;
      return;
    }

    currentUser = data.user;

    emailInput.value = "";
    passwordInput.value = "";

    showApp();
    await loadItems();
  }

  async function logout() {
    await supabaseClient.auth.signOut();
    showLogin();
  }

  async function loadItems() {
    if (!currentUser) {
      showLogin();
      return;
    }

    setStatus("Lade Daten...");

    const { data, error } = await supabaseClient
      .from("items")
      .select("id, name, comment, link, checked, created_at, user_id")
      .order("name", { ascending: true });

    if (error) {
      setStatus("Fehler beim Laden der Daten.", true);
      showSupabaseError("Fehler beim Laden", error);
      return;
    }

    items = data || [];

    setStatus("");
    render();
  }

  function render() {
    listContainer.innerHTML = "";

    let checkedCount = 0;

    items.forEach((item) => {
      const div = document.createElement("div");
      div.className = "item";

      const top = document.createElement("div");
      top.className = "item-top";

      const left = document.createElement("div");
      left.className = "left";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = item.checked === true;

      if (checkbox.checked) {
        checkedCount++;
      }

      checkbox.addEventListener("change", async () => {
        const newValue = checkbox.checked;

        const { error } = await supabaseClient
          .from("items")
          .update({
            checked: newValue
          })
          .eq("id", item.id);

        if (error) {
          checkbox.checked = item.checked === true;
          showSupabaseError("Fehler beim Speichern des Hakens", error);
          return;
        }

        item.checked = newValue;
        render();
      });

      const label = document.createElement("label");
      label.textContent = item.name || "Unbenannt";

      left.appendChild(checkbox);
      left.appendChild(label);

      const actions = document.createElement("div");
      actions.className = "actions";

      const commentBtn = document.createElement("div");
      commentBtn.className = "btn-small";
      commentBtn.textContent = "💬";
      commentBtn.title = "Kommentar anzeigen/bearbeiten";

      const linkBtn = document.createElement("div");
      linkBtn.className = "btn-small";
      linkBtn.textContent = "🔗";
      linkBtn.title = "Link anzeigen/bearbeiten";

      const deleteBtn = document.createElement("div");
      deleteBtn.className = "btn-small";
      deleteBtn.textContent = "❌";
      deleteBtn.title = "Eintrag löschen";

      function updateCommentIcon() {
        if (item.comment && item.comment.trim() !== "") {
          commentBtn.classList.add("has-comment");
        } else {
          commentBtn.classList.remove("has-comment");
        }
      }

      function updateLinkIcon() {
        if (item.link && item.link.trim() !== "") {
          linkBtn.classList.add("has-link");
        } else {
          linkBtn.classList.remove("has-link");
        }
      }

      updateCommentIcon();
      updateLinkIcon();

      actions.appendChild(commentBtn);
      actions.appendChild(linkBtn);
      actions.appendChild(deleteBtn);

      top.appendChild(left);
      top.appendChild(actions);

      const comment = document.createElement("input");
      comment.className = "comment";
      comment.placeholder = "Kommentar hinzufügen...";
      comment.value = item.comment || "";

      const linkInput = document.createElement("input");
      linkInput.className = "link-input";
      linkInput.placeholder = "Link eingeben...";
      linkInput.value = item.link || "";

      commentBtn.onclick = () => {
        comment.classList.toggle("visible");

        if (comment.classList.contains("visible")) {
          comment.focus();
        }
      };

      linkBtn.onclick = () => {
        linkInput.classList.toggle("visible");

        if (linkInput.classList.contains("visible")) {
          linkInput.focus();
          linkInput.select();
        }
      };

      const saveCommentDebounced = debounce(async (value) => {
        const { error } = await supabaseClient
          .from("items")
          .update({
            comment: value
          })
          .eq("id", item.id);

        if (error) {
          showSupabaseError("Fehler beim Speichern des Kommentars", error);
        }
      });

      comment.addEventListener("input", () => {
        item.comment = comment.value;
        updateCommentIcon();
        saveCommentDebounced(comment.value);
      });

      const saveLinkDebounced = debounce(async (value) => {
        const normalizedValue = normalize(value.trim());

        const { error } = await supabaseClient
          .from("items")
          .update({
            link: normalizedValue
          })
          .eq("id", item.id);

        if (error) {
          showSupabaseError("Fehler beim Speichern des Links", error);
          return;
        }

        item.link = normalizedValue;
        linkInput.value = normalizedValue;
        updateLinkIcon();
      });

      linkInput.addEventListener("input", () => {
        item.link = linkInput.value;
        updateLinkIcon();
        saveLinkDebounced(linkInput.value);
      });

      deleteBtn.onclick = async () => {
        const confirmed = confirm(
          `"${item.name || "Unbenannt"}" wirklich löschen?`
        );

        if (!confirmed) return;

        const { error } = await supabaseClient
          .from("items")
          .delete()
          .eq("id", item.id);

        if (error) {
          showSupabaseError("Fehler beim Löschen", error);
          return;
        }

        await loadItems();
      };

      div.appendChild(top);
      div.appendChild(comment);
      div.appendChild(linkInput);

      listContainer.appendChild(div);
    });

    document.getElementById("progressText").textContent =
      `Fortschritt: ${checkedCount} / ${items.length}`;
  }

  async function addItem() {
    if (!currentUser) {
      showLogin();
      return;
    }

    const value = newItemInput.value.trim();

    if (!value) {
      alert("Bitte einen Namen eingeben.");
      return;
    }

    const newItem = {
      id: crypto.randomUUID(),
      name: value,
      comment: "",
      link: "",
      checked: false,
      user_id: currentUser.id
    };

    const { data, error } = await supabaseClient
      .from("items")
      .insert(newItem)
      .select("id, name, comment, link, checked, created_at, user_id")
      .single();

    if (error) {
      showSupabaseError("Fehler beim Speichern", error);
      return;
    }

    newItemInput.value = "";

    if (data) {
      items.push(data);

      items.sort((a, b) => {
        return (a.name || "").localeCompare(b.name || "", "de");
      });

      render();
    } else {
      await loadItems();
    }
  }

  async function resetAll() {
    if (!currentUser) {
      showLogin();
      return;
    }

    const confirmed = confirm("Alle Haken entfernen?");

    if (!confirmed) return;

    const { error } = await supabaseClient
      .from("items")
      .update({
        checked: false
      })
      .not("id", "is", null);

    if (error) {
      showSupabaseError("Fehler beim Zurücksetzen", error);
      return;
    }

    await loadItems();
  }

  passwordInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      login();
    }
  });

  emailInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      passwordInput.focus();
    }
  });

  newItemInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      addItem();
    }
  });

  initAuth();
</script>

</body>
</html>
