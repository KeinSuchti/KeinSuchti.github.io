<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch and Feast</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #303030;
  color: #fff;
  padding: 20px;
}

.container {
  max-width: 850px;
  margin: auto;
}

h1,
h2 {
  text-align: center;
}

button,
select,
input,
textarea {
  font-family: inherit;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #272EF5;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2795F5;
}

input,
select,
textarea {
  border: none;
  border-radius: 10px;
  padding: 10px;
  box-sizing: border-box;
}

#loginBox,
#menuBox,
.app-panel {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

#loginBox input {
  display: block;
  width: 100%;
  margin-top: 10px;
  font-size: 16px;
}

#loginError {
  color: #ff7777;
  white-space: pre-wrap;
}

.user-info,
.status {
  color: #aaa;
  text-align: center;
  margin: 12px 0;
  word-break: break-word;
  white-space: pre-wrap;
}

.status:empty {
  display: none;
}

.error {
  color: #ff7777;
}

.top-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.top-actions button {
  margin-top: 0;
}

.back-button,
.logout-button {
  background: #444;
}

.back-button:hover,
.logout-button:hover {
  background: #555;
}

.arrow-back-button {
  font-weight: bold;
}

.menu-grid {
  display: grid;
  gap: 15px;
  margin-top: 20px;
}

.menu-grid button {
  font-size: 20px;
  padding: 18px;
}



/* Serien & Filme */

.random-movie-button {
  margin-top: 0;
  margin-bottom: 10px;
}

.movie-item {
  margin: 8px 0;
  padding: 10px;
  background: #2a2a2a;
  border-radius: 8px;
}

.movie-item-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.movie-left {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.movie-left label {
  word-break: break-word;
}

input[type="checkbox"] {
  transform: scale(1.2);
  cursor: pointer;
}

.movie-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.btn-small {
  position: relative;
  background: #444;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  user-select: none;
}

.btn-small:hover {
  background: #555;
}

.btn-small.has-comment::after,
.btn-small.has-link::after {
  content: "";
  position: absolute;
  top: 2px;
  right: 2px;
  width: 8px;
  height: 8px;
  background: Blue;
  border-radius: 50%;
}

.movie-comment,
.movie-link-input {
  margin-top: 8px;
  padding: 8px;
  border-radius: 6px;
  border: none;
  width: 100%;
  display: none;
  box-sizing: border-box;
}

.movie-comment.visible,
.movie-link-input.visible {
  display: block;
}

.movie-add-section {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

.movie-add-section input {
  flex: 1;
}

.movie-add-section button {
  width: auto;
  min-width: 48px;
  margin-top: 0;
}

.progress {
  margin-top: 20px;
  text-align: center;
}

/* Kartenlisten: Feast Table, Bier, Cocktail */

.random-card-button {
  margin-top: 0;
  margin-bottom: 10px;
}

.card-controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.card-controls select {
  flex: 1;
  min-width: 180px;
}

.card-item {
  background: #2a2a2a;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.card-item-header {
  display: flex;
  gap: 15px;
  align-items: stretch;
}

.card-content {
  flex: 1;
  min-width: 0;
}

.image-wrapper {
  width: 180px;
  aspect-ratio: 16 / 9;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: 12px;
  background: #111;
}

.image {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 0;
  cursor: pointer;
}

.image.no-url {
  cursor: zoom-in;
}

.card-title {
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 10px;
  word-break: break-word;
}

.card-actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}

.btn-link { background: #2c2c2c; }
.btn-img { background: #1f3b5c; }
.btn-note { background: #4a3b1f; }
.btn-del { background: #5c1f1f; }

.btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.2);
}

.btn:active {
  transform: scale(0.95);
}

.card-comment,
.card-url-input {
  display: none;
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #333;
  color: white;
  box-sizing: border-box;
}

.card-comment {
  resize: vertical;
  min-height: 100px;
}

.card-comment.visible,
.card-url-input.visible {
  display: block;
}

.star {
  opacity: 0.3;
  cursor: pointer;
  font-size: 22px;
}

.star.active {
  opacity: 1;
}

.card-add-form {
  margin-top: 15px;
  display: grid;
  gap: 10px;
}

.card-add-form input {
  width: 100%;
}


/* Bier-Notenskala */

.beer-add-rating-input {
  width: 100%;
}

.beer-grade-wrapper {
  margin-top: 14px;
  background: #202020;
  padding: 12px;
  border-radius: 12px;
}

.beer-grade-label {
  font-weight: bold;
  margin-bottom: 10px;
  text-align: center;
}

.beer-grade-inputs {
  display: grid;
  grid-template-columns: 1fr 92px;
  gap: 10px;
  align-items: center;
}

.beer-grade-slider {
  width: 100%;
  accent-color: #272EF5;
}

.beer-grade-number {
  width: 100%;
  text-align: center;
  background: #333;
  color: white;
}

.beer-grade-scale-labels {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  margin-top: 8px;
  font-size: 11px;
  color: #bbb;
  text-align: center;
}


/* Spiele */

.games-column-form,
.games-add-form {
  margin-top: 15px;
  display: grid;
  gap: 10px;
}

.games-column-form input,
.games-add-form input {
  width: 100%;
}

.games-check-controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 15px;
  margin-bottom: 15px;
}

.games-check-controls select {
  flex: 1;
  min-width: 220px;
}

.games-table-wrapper {
  margin-top: 18px;
  overflow-x: auto;
  border-radius: 16px;
}

.games-table {
  width: 100%;
  min-width: 720px;
  border-collapse: separate;
  border-spacing: 0 8px;
}

.games-table th,
.games-table td {
  background: #2a2a2a;
  padding: 10px;
  vertical-align: middle;
  text-align: center;
}

.games-table th:first-child,
.games-table td:first-child {
  text-align: left;
  min-width: 280px;
}

.games-table th:first-child {
  border-radius: 12px 0 0 12px;
}

.games-table th:last-child {
  border-radius: 0 12px 12px 0;
}

.games-table tbody tr td:first-child {
  border-radius: 12px 0 0 12px;
}

.games-table tbody tr td:last-child {
  border-radius: 0 12px 12px 0;
}

.game-row-main {
  display: flex;
  align-items: center;
  gap: 12px;
}

.game-image-wrapper {
  width: 130px;
  aspect-ratio: 16 / 9;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: 12px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
}

.game-image {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

.game-image-placeholder {
  color: #777;
  font-size: 28px;
}

.game-info {
  min-width: 0;
}

.game-name {
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  word-break: break-word;
}

.game-url {
  margin-top: 4px;
  font-size: 12px;
  color: #bbb;
  word-break: break-all;
}


.game-row-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.games-drag-hint {
  color: #bbb;
  font-size: 13px;
  text-align: center;
}

.game-column-header {
  display: grid;
  gap: 6px;
  justify-items: center;
  cursor: grab;
  user-select: none;
  touch-action: none;
  padding: 4px;
  border-radius: 10px;
}

.game-column-header:active {
  cursor: grabbing;
}

.game-column-header.dragging {
  opacity: 0.45;
}

.game-column-header.drag-over {
  outline: 2px dashed #2795F5;
  outline-offset: 4px;
}

.game-column-drag-handle {
  color: #aaa;
  font-size: 18px;
  line-height: 1;
}

.game-column-title {
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}

.games-table th {
  white-space: nowrap;
}

.game-row-delete,
.game-row-edit,
.game-row-link {
  width: auto;
  margin-top: 0;
  padding: 6px 9px;
  border-radius: 8px;
  font-size: 13px;
}

.game-row-link {
  background: #2c2c2c;
}

.game-row-edit {
  background: #3b315f;
}

.game-row-edit:hover {
  background: #51417f;
}

.game-row-link:hover {
  background: #444;
}


.game-row-delete {
  background: #5c1f1f;
}

.game-row-delete:hover {
  background: #7a2929;
}

.game-row-image-upload {
  background: #1f3b5c;
}

.game-row-image-upload:hover {
  background: #28517d;
}

.game-check {
  transform: scale(1.35);
}

.games-empty {
  color: #bbb;
  text-align: center;
  padding: 16px;
}


.games-mobile-list {
  display: none;
}

.game-mobile-card {
  background: #2a2a2a;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.game-mobile-checks {
  margin-top: 14px;
  display: grid;
  gap: 8px;
}

.game-mobile-check-row {
  background: #333;
  border-radius: 10px;
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.game-mobile-check-title {
  font-weight: bold;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.game-mobile-check-row .game-check {
  flex-shrink: 0;
}

.game-mobile-no-columns {
  margin-top: 14px;
  color: #bbb;
  background: #333;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}


/* Yu-Gi-Oh!-Decks */

.yugioh-add-form,
.yugioh-player-panel {
  margin-top: 15px;
  display: grid;
  gap: 10px;
}

.yugioh-add-form input,
.yugioh-player-panel input,
.yugioh-player-panel textarea {
  width: 100%;
}

.yugioh-player-panel {
  background: #252525;
  padding: 14px;
  border-radius: 14px;
  margin-bottom: 18px;
}

.yugioh-player-grid {
  display: grid;
  gap: 8px;
}

.yugioh-list {
  margin-top: 18px;
  display: grid;
  gap: 15px;
}

.yugioh-deck-card {
  background: #2a2a2a;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.yugioh-deck-main {
  display: flex;
  gap: 15px;
  align-items: stretch;
}

.yugioh-image-wrapper {
  width: 180px;
  aspect-ratio: 16 / 9;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: 12px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
}

.yugioh-image {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

.yugioh-image-placeholder {
  color: #777;
  font-size: 30px;
  cursor: pointer;
}

.yugioh-info {
  min-width: 0;
  flex: 1;
}

.yugioh-theme {
  font-size: 22px;
  font-weight: bold;
  word-break: break-word;
  margin-bottom: 8px;
}

.yugioh-meta {
  color: #ddd;
  margin-top: 4px;
  word-break: break-word;
}

.yugioh-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.yugioh-actions button {
  width: auto;
  margin-top: 0;
  padding: 6px 9px;
  border-radius: 8px;
  font-size: 13px;
}

.yugioh-image-button {
  background: #1f3b5c;
}

.yugioh-image-button:hover {
  background: #28517d;
}

.yugioh-delete-button {
  background: #5c1f1f;
}

.yugioh-delete-button:hover {
  background: #7a2929;
}

.yugioh-assignment-results {
  margin-top: 12px;
  display: grid;
  gap: 8px;
}

.yugioh-assignment-card {
  background: #1e1e1e;
  border-radius: 12px;
  padding: 10px;
}

.assignment-popup-box {
  background: #1e1e1e;
  color: white;
  padding: 26px;
  border-radius: 18px;
  max-width: 780px;
  width: calc(100% - 40px);
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
}

.assignment-popup-box h3 {
  text-align: center;
  margin: 0 0 18px 0;
  font-size: 26px;
}

.assignment-popup-results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}

.assignment-result-card {
  background: #2a2a2a;
  border-radius: 16px;
  padding: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}

.assignment-player-name {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
  text-align: center;
  color: #ffffff;
}

.assignment-deck-image-wrapper {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 12px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
}

.assignment-deck-image {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.assignment-deck-placeholder {
  color: #777;
  font-size: 34px;
}

.assignment-deck-theme {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 6px;
  word-break: break-word;
}

.assignment-deck-meta {
  color: #ddd;
  font-size: 14px;
  margin-top: 4px;
  word-break: break-word;
}

.assignment-popup-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.assignment-popup-actions button {
  margin-top: 0;
}

@media (max-width: 650px) {
  .assignment-popup-actions {
    grid-template-columns: 1fr;
  }
}

.yugioh-empty {
  color: #bbb;
  text-align: center;
  padding: 16px;
}

@media (max-width: 650px) {
  .yugioh-deck-main {
    flex-direction: column;
  }

  .yugioh-image-wrapper {
    width: 100%;
  }
}


/* Bearbeiten-Popup */

.btn-edit {
  background: #3b315f;
}

.btn-edit:hover {
  background: #51417f;
}

.edit-entry-button,
.game-row-edit,
.yugioh-edit-button {
  background: #3b315f;
}

.edit-entry-button:hover,
.game-row-edit:hover,
.yugioh-edit-button:hover {
  background: #51417f;
}

.edit-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.75);
  align-items: center;
  justify-content: center;
  z-index: 10000;
}

.edit-box {
  background: #1e1e1e;
  color: white;
  padding: 24px;
  border-radius: 18px;
  max-width: 520px;
  width: calc(100% - 40px);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
}

.edit-box h3 {
  margin: 0 0 16px 0;
  text-align: center;
}

.edit-fields {
  display: grid;
  gap: 12px;
}

.edit-field {
  display: grid;
  gap: 6px;
}

.edit-field label {
  color: #ddd;
  font-size: 14px;
  font-weight: bold;
}

.edit-field input,
.edit-field textarea,
.edit-field select {
  width: 100%;
  background: #333;
  color: white;
}

.edit-field textarea {
  min-height: 110px;
  resize: vertical;
}

.edit-checkbox-field {
  display: flex;
  gap: 10px;
  align-items: center;
}

.edit-checkbox-field input {
  width: auto;
}

.edit-actions {
  display: grid;
  gap: 10px;
  margin-top: 16px;
}

.edit-actions button {
  margin-top: 0;
}

.edit-cancel-button {
  background: #444;
}

.edit-cancel-button:hover {
  background: #555;
}

/* Zufalls-Popup */

.popup-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.75);
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.popup-box {
  background: #1e1e1e;
  color: white;
  padding: 30px;
  border-radius: 18px;
  max-width: 420px;
  width: calc(100% - 40px);
  text-align: center;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
}

.popup-box p {
  font-size: 24px;
  font-weight: bold;
  margin: 0 0 20px 0;
}

.popup-actions {
  display: grid;
  gap: 10px;
}

.popup-actions button {
  margin-top: 0;
}

@media (max-width: 650px) {
  .top-actions {
    flex-direction: column;
  }

  .card-item-header {
    flex-direction: column;
  }

  .image-wrapper {
    width: 100%;
    aspect-ratio: 16 / 9;
  }

  .image {
    height: 100%;
  }
}

@media (max-width: 650px) {
  .games-table-wrapper {
    overflow-x: visible;
  }

  .games-desktop-table {
    display: none;
  }

  .games-mobile-list {
    display: grid;
    gap: 15px;
  }

  .game-mobile-card .game-row-main {
    flex-direction: column;
    align-items: stretch;
  }

  .game-mobile-card .game-image-wrapper {
    width: 100%;
    max-width: none;
  }

  .game-mobile-card .game-info {
    width: 100%;
  }

  .game-mobile-card .game-row-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .game-mobile-card .game-row-actions button {
    width: 100%;
  }
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">
  <h1>📚 Watch and Feast</h1>

  <!-- Login -->
  <div id="loginBox">
    <h2>Login</h2>

    <input
      type="email"
      id="email"
      placeholder="E-Mail"
      autocomplete="email"
    >

    <input
      type="password"
      id="password"
      placeholder="Passwort"
      autocomplete="current-password"
    >

    <button onclick="login()">Einloggen</button>

    <p id="loginError"></p>
  </div>

  <!-- App -->
  <div id="appShell" style="display:none;">
    <div id="userInfo" class="user-info"></div>

    <div class="top-actions">
      <button
        id="appBackButton"
        class="back-button arrow-back-button"
        onclick="goBackInApp()"
        style="display:none;"
      >
        ← Zurück
      </button>
      <button class="back-button" onclick="showMenu()">🏠 Menü</button>

}

function createEditField(field) {
  const wrapper = document.createElement("div");
  wrapper.className = field.type === "checkbox" ? "edit-checkbox-field" : "edit-field";

  const label = document.createElement("label");
  label.htmlFor = "editField_" + field.key;
  label.textContent = field.label;

  let input;

  if (field.type === "textarea") {
    input = document.createElement("textarea");
    input.value = field.value || "";
  } else if (field.type === "select") {
    input = document.createElement("select");

    (field.options || []).forEach(option => {
      const optionElement = document.createElement("option");
      optionElement.value = option.value;
      optionElement.textContent = option.label;
      input.appendChild(optionElement);
    });

    input.value = field.value || "";
  } else {
    input = document.createElement("input");
    input.type = field.type || "text";

    if (field.inputMode) {
      input.inputMode = field.inputMode;
    }

    if (field.min !== undefined) input.min = field.min;
    if (field.max !== undefined) input.max = field.max;
    if (field.step !== undefined) input.step = field.step;

    if (field.type === "checkbox") {
      input.checked = field.value === true;
    } else {
      input.value = field.value || "";
    }
  }

  input.id = "editField_" + field.key;
  input.dataset.key = field.key;

  if (field.placeholder) {
    input.placeholder = field.placeholder;
  }

  if (field.type === "checkbox") {
    wrapper.appendChild(input);
    wrapper.appendChild(label);
  } else {
    wrapper.appendChild(label);
    wrapper.appendChild(input);
  }

  return wrapper;
}

function getEditInputValue(key) {

    }

    changes.url = normalizedUrl;
    changes.rating = rating;
    shouldTryAutoImage = normalizedUrl && normalizedUrl !== (item.url || "") && !item.image;
  }

  const success = await updateCardItem(
    type,
    item.id,
    changes,
    "Fehler beim Bearbeiten von " + config.title
  );

  if (!success) return;

  Object.assign(item, changes);
  closeEditEntryModal();
  renderCardItems(type);

  if (shouldTryAutoImage) {
    autoImage(type, changes.url, item.id);
  }
}

function showPanelForView(view) {
  hideAllPanels();

  if (view === "saufi") {
    saufiMenuBox.style.display = "block";
  } else if (view === "movies") {
    moviesApp.style.display = "block";

    currentView = "menu";

  updateBackButtonVisibility();

function updateBackButtonVisibility() {
  const backButton = document.getElementById("appBackButton");

  if (!backButton) return;

  backButton.style.display = currentView === "menu" ? "none" : "block";
}

function writeAppHistory(view, mode) {
  if (!window.history || !window.history.pushState) return;

  const state = { appView: view };
  const hash = "#" + view;

  if (mode === "replace") {
    window.history.replaceState(state, "", hash);
  } else if (mode === "push") {
    window.history.pushState(state, "", hash);
  }
}

async function navigateToView(view, historyMode = "push") {
  if (!currentUser && view !== "menu") {
    showLogin();
    return;
  }

  showPanelForView(view);

  if (!suppressHistoryPush) {
    writeAppHistory(currentView, historyMode);
  }

  const loader = appViewLoaders[currentView];

  if (typeof loader === "function") {
    await loader();
  }
}

function goBackInApp() {
  if (currentView === "menu") return;

  window.history.back();
}

function getViewFromHistoryState(event) {
  if (event.state && event.state.appView) {
    return event.state.appView;
  }

  const hashView = window.location.hash.replace("#", "");

  if (hashView) {
    return hashView;
  }

  return "menu";
}

window.addEventListener("popstate", async event => {
  if (!currentUser) return;

  suppressHistoryPush = true;

  try {
    await navigateToView(getViewFromHistoryState(event), "replace");
  } finally {
    suppressHistoryPush = false;
  }
});

function showMenu(pushHistory = true) {
  return navigateToView("menu", pushHistory ? "push" : "replace");
}

function showSaufiMenu() {
  return navigateToView("saufi", "push");
}

async function loadMovieItems() {

  const { data, error } = await supabaseClient
    .from(MOVIE_TABLE)
    .select("id, name, comment, link, checked, created_at, user_id")
    .order("name", { ascending: true });

  if (error) {
    setStatus("Fehler beim Laden der Serien & Filme.", true);
    showSupabaseError("Fehler beim Laden der Serien & Filme", error);
    return;
  }

  movieItems = data || [];

  setStatus("");
  renderMovieItems();
}

function renderMovieItems() {
  movieList.innerHTML = "";

  let checkedCount = 0;

  movieItems.forEach((item) => {
    const div = document.createElement("div");
    div.className = "movie-item";

    const top = document.createElement("div");
    top.className = "movie-item-top";

    const left = document.createElement("div");
    left.className = "movie-left";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = item.checked === true;

    if (checkbox.checked) {
      checkedCount++;
    }

    checkbox.addEventListener("change", async () => {
      const newValue = checkbox.checked;

      const { error } = await supabaseClient
        .from(MOVIE_TABLE)
        .update({ checked: newValue })
        .eq("id", item.id);

      if (error) {
        checkbox.checked = item.checked === true;
        showSupabaseError("Fehler beim Speichern des Hakens", error);
        return;
      }

      item.checked = newValue;
      renderMovieItems();
    });

    const label = document.createElement("label");
    label.textContent = item.name || "Unbenannt";

    left.appendChild(checkbox);
    left.appendChild(label);

    const actions = document.createElement("div");
    actions.className = "movie-actions";

    const commentBtn = document.createElement("div");
    commentBtn.className = "btn-small";
    commentBtn.textContent = "💬";

    const linkBtn = document.createElement("div");
    linkBtn.className = "btn-small";
    linkBtn.textContent = "🔗";

    const editBtn = createSmallEditButton(() => openMovieEdit(item.id));

    const deleteBtn = document.createElement("div");
    deleteBtn.className = "btn-small";
    deleteBtn.textContent = "❌";

    function updateCommentIcon() {
      if (item.comment && item.comment.trim() !== "") {
        commentBtn.classList.add("has-comment");
      } else {
        commentBtn.classList.remove("has-comment");
      }
    }

    function updateLinkIcon() {
      if (item.link && item.link.trim() !== "") {
        linkBtn.classList.add("has-link");
      } else {
        linkBtn.classList.remove("has-link");
      }
    }

    updateCommentIcon();
    updateLinkIcon();

    actions.appendChild(editBtn);
    actions.appendChild(commentBtn);
    actions.appendChild(linkBtn);
    actions.appendChild(deleteBtn);

    top.appendChild(left);
    top.appendChild(actions);

    const comment = document.createElement("input");
    comment.className = "movie-comment";
    comment.placeholder = "Kommentar hinzufügen...";
    comment.value = item.comment || "";

    const linkInput = document.createElement("input");
    linkInput.className = "movie-link-input";
    linkInput.placeholder = "Link eingeben...";
    linkInput.value = item.link || "";

    commentBtn.onclick = () => {
      comment.classList.toggle("visible");

      if (comment.classList.contains("visible")) {
        comment.focus();
      }
    };

    linkBtn.onclick = () => {
      linkInput.classList.toggle("visible");

      if (linkInput.classList.contains("visible")) {
        linkInput.focus();
        linkInput.select();
      }
    };

    const saveCommentDebounced = debounce(async (value) => {
      const { error } = await supabaseClient
        .from(MOVIE_TABLE)
        .update({ comment: value })
        .eq("id", item.id);

      if (error) {
        showSupabaseError("Fehler beim Speichern des Kommentars", error);
      }
    });

    comment.addEventListener("input", () => {
      item.comment = comment.value;
      updateCommentIcon();
      saveCommentDebounced(comment.value);
    });

    const saveLinkDebounced = debounce(async (value) => {
      const normalizedValue = normalize(value.trim());

      const { error } = await supabaseClient
        .from(MOVIE_TABLE)
        .update({ link: normalizedValue })
        .eq("id", item.id);

      if (error) {
        showSupabaseError("Fehler beim Speichern des Links", error);
        return;
      }

      item.link = normalizedValue;
      linkInput.value = normalizedValue;
      updateLinkIcon();
    });

    linkInput.addEventListener("input", () => {
      item.link = linkInput.value;
      updateLinkIcon();
      saveLinkDebounced(linkInput.value);
    });

    deleteBtn.onclick = async () => {
      const confirmed = confirm(
        `"${item.name || "Unbenannt"}" wirklich löschen?`
      );

      if (!confirmed) return;

      const { error } = await supabaseClient
        .from(MOVIE_TABLE)
        .delete()
        .eq("id", item.id);

      if (error) {
        showSupabaseError("Fehler beim Löschen", error);
        return;
      }

      movieItems = movieItems.filter(entry => entry.id !== item.id);
      renderMovieItems();
    };

    addDblClickEdit(div, () => openMovieEdit(item.id));

    div.appendChild(top);
    div.appendChild(comment);
    div.appendChild(linkInput);

    movieList.appendChild(div);
  });

  document.getElementById("movieProgressText").textContent =
    `Fortschritt: ${checkedCount} / ${movieItems.length}`;
}

function openRandomUncheckedMovie() {
  if (!Array.isArray(movieItems)) {
    showRandomPopup("Die Liste wurde noch nicht geladen.");
    return;
  }

  const candidates = movieItems.filter(function(item) {
    return (
      item.checked === null ||
      item.checked === undefined ||
      item.checked === false
    );
  });

  if (candidates.length === 0) {
    showRandomPopup("Es gibt keinen offenen Serien- oder Film-Eintrag mehr.");
    return;
  }

  const randomIndex = Math.floor(Math.random() * candidates.length);
  const selectedItem = candidates[randomIndex];

  const selectedName = selectedItem.name || "etwas Unbekanntes";

  const selectedUrl =
    selectedItem.link && selectedItem.link.trim() !== ""
      ? normalize(selectedItem.link.trim())
      : "";

  showRandomPopup("Wir schauen " + selectedName + "!", selectedUrl);
}

function compressImage(input, callback) {
  if (typeof input === "string") {
    const img = new Image();
    img.crossOrigin = "anonymous";

    img.onload = () => {
      resizeImage(img, callback);
    };

    img.onerror = () => {
      callback("");
    };

    img.src = input;
  } else {
    const reader = new FileReader();

    reader.onload = event => {
      const img = new Image();

      img.onload = () => {
        resizeImage(img, callback);
      };

      img.onerror = () => {
        callback("");
      };

      img.src = event.target.result;
    };

    reader.readAsDataURL(input);
  }
}

function resizeImage(img, callback) {
  const canvas = document.createElement("canvas");
  const targetWidth = 800;
  const targetHeight = 450;
  const targetRatio = targetWidth / targetHeight;
  const sourceRatio = img.width / img.height;

  let sourceX = 0;
  let sourceY = 0;
  let sourceWidth = img.width;
  let sourceHeight = img.height;

  if (sourceRatio > targetRatio) {
    sourceWidth = img.height * targetRatio;
    sourceX = (img.width - sourceWidth) / 2;
  } else if (sourceRatio < targetRatio) {
    sourceHeight = img.width / targetRatio;
    sourceY = (img.height - sourceHeight) / 2;
  }

  canvas.width = targetWidth;
  canvas.height = targetHeight;

  canvas
    .getContext("2d")
    .drawImage(
      img,
      sourceX,
      sourceY,
      sourceWidth,
      sourceHeight,
      0,
      0,
      targetWidth,
      targetHeight
    );

  callback(canvas.toDataURL("image/jpeg", 0.75));
}

function autoImage(type, url, itemId) {
  if (!url) return;

  const config = cardLists[type];

  const api =
    "https://api.microlink.io/?url=" + encodeURIComponent(url);

  fetch(api)
    .then(response => response.json())
    .then(data => {
      const imageUrl =
        data?.data?.image?.url ||
        new URL(url).origin + "/favicon.ico";

      compressImage(imageUrl, async compressed => {
        if (!compressed) return;

        const item = config.items.find(entry => entry.id === itemId);

        if (!item || item.image) return;

        item.image = compressed;

        const success = await updateCardItem(
          type,
          item.id,
          { image: compressed },
          "Fehler beim Speichern des Vorschaubilds"
        );

        if (success) {
          renderCardItems(type);
        }
      });
    })
    .catch(error => {
      console.warn("Automatisches Bild konnte nicht geladen werden:", error);
    });
}

function renderCardItems(type) {
  const config = cardLists[type];

  config.listElement.innerHTML = "";

  let data = [...config.items];
  const sort = config.sortElement.value;

  if (type === "beer") {
    const filter = config.filterElement.value;

    data = data.filter(item => {
      const rating = Number(item.rating || 0);

      if (filter === "all") {
        return true;
      }

      if (filter === "unrated") {
        return rating === 0;
      }

      if (filter === "6") {
        return rating === 6;
      }

      const grade = Number(filter);
      return rating >= grade && rating < grade + 1;
    });

    if (sort === "best") {
      data.sort((a, b) => {
        const aRating = Number(a.rating || 0);
        const bRating = Number(b.rating || 0);

        const aValue = aRating === 0 ? 99 : aRating;
        const bValue = bRating === 0 ? 99 : bRating;

        return aValue - bValue;
      });
    } else if (sort === "worst") {
      data.sort((a, b) => {
        const aRating = Number(a.rating || 0);
        const bRating = Number(b.rating || 0);

        const aValue = aRating === 0 ? -1 : aRating;
        const bValue = bRating === 0 ? -1 : bRating;

        return bValue - aValue;
      });
    }
  } else {
    const filter = Number(config.filterElement.value);

    data = data.filter(item => (item.rating || 0) >= filter);

    if (sort === "high") {
      data.sort((a, b) => (b.rating || 0) - (a.rating || 0));
    } else if (sort === "low") {
      data.sort((a, b) => (a.rating || 0) - (b.rating || 0));
    }
  }

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card-item";

    const header = document.createElement("div");
    header.className = "card-item-header";

    if (item.image) {
      const imgWrap = document.createElement("div");
      imgWrap.className = "image-wrapper";

      const img = document.createElement("img");
      img.src = item.image;
      img.className = item.url ? "image" : "image no-url";
      img.alt = item.name ? "Vorschaubild von " + item.name : "Vorschaubild";

      img.onclick = () => {
        if (item.url) {
          window.open(item.url, "_blank");
        } else if (item.image) {
          window.open(item.image, "_blank");
        }
      };

      imgWrap.appendChild(img);
      header.appendChild(imgWrap);
    }

    const content = document.createElement("div");
    content.className = "card-content";

    const title = document.createElement("div");
    title.className = "card-title";
    title.textContent = item.name || "Unbenannt";

    title.onclick = () => {
      if (item.url) {
        window.open(item.url, "_blank");
      }
    };

    const linkInput = document.createElement("input");
    linkInput.className = "card-url-input";
    linkInput.value = item.url || "";
    linkInput.placeholder = "Link bearbeiten...";

    const saveLinkDebounced = debounce(async value => {
      const normalizedUrl = normalize(value.trim());

      item.url = normalizedUrl;

      const success = await updateCardItem(
        type,
        item.id,
        { url: normalizedUrl },
        "Fehler beim Speichern des Links"
      );

      if (success) {
        linkInput.value = normalizedUrl;
      }
    });

    linkInput.addEventListener("input", () => {
      saveLinkDebounced(linkInput.value);
    });

    const actions = document.createElement("div");
    actions.className = "card-actions";

    const editBtn = createEditIconButton(() => openCardEdit(type, item.id));
    const imgBtn = createCardButton("🖼️", "btn btn-img");
    const noteBtn = createCardButton("📝", "btn btn-note");
    const delBtn = createCardButton("❌", "btn btn-del");

    if (type !== "beer") {
      const linkBtn = createCardButton("🔗", "btn btn-link");

      linkBtn.onclick = () => {
        linkInput.classList.toggle("visible");

        if (linkInput.classList.contains("visible")) {
          linkInput.focus();
          linkInput.select();
        }
      };

      actions.appendChild(linkBtn);
    }

    const comment = document.createElement("textarea");
    comment.className = "card-comment";
    comment.value = item.comment || "";
    comment.placeholder = "Kommentar hinzufügen...";

    noteBtn.onclick = () => {
      comment.classList.toggle("visible");

      if (comment.classList.contains("visible")) {
        comment.focus();
      }
    };

    const saveCommentDebounced = debounce(async value => {
      item.comment = value;

      await updateCardItem(
        type,
        item.id,
        { comment: value },
        "Fehler beim Speichern des Kommentars"
      );
    });

    comment.addEventListener("input", () => {
      saveCommentDebounced(comment.value);
    });

    imgBtn.onclick = () => {
      const file = document.createElement("input");
      file.type = "file";
      file.accept = "image/*";

      file.onchange = event => {
        const selected = event.target.files[0];

        if (!selected) return;

        compressImage(selected, async compressed => {
          if (!compressed) {
            alert("Bild konnte nicht verarbeitet werden.");
            return;
          }

          item.image = compressed;

          const success = await updateCardItem(
            type,
            item.id,
            { image: compressed },
            "Fehler beim Speichern des Bildes"
          );

          if (success) {
            renderCardItems(type);
          }
        });
      };

      file.click();
    };

    delBtn.onclick = async () => {
      if (!confirm("Eintrag löschen?")) return;

      const { error } = await supabaseClient
        .from(config.table)
        .delete()
        .eq("id", item.id);

      if (error) {
        showSupabaseError("Fehler beim Löschen", error);
        return;
      }

      config.items = config.items.filter(entry => entry.id !== item.id);
      renderCardItems(type);
    };

    actions.append(editBtn, imgBtn, noteBtn, delBtn);

    content.appendChild(title);
    content.appendChild(actions);

    if (type === "beer") {
      content.appendChild(createBeerGradeSlider(item, type));
    } else {
      const stars = document.createElement("div");

      for (let s = 1; s <= 5; s++) {
        const star = document.createElement("span");
        star.textContent = "⭐";
        star.className = "star";

        if ((item.rating || 0) >= s) {
          star.classList.add("active");
        }

        star.onclick = async () => {
          item.rating = s;

          const success = await updateCardItem(
            type,
            item.id,
            { rating: s },
            "Fehler beim Speichern der Bewertung"
          );

          if (success) {
            renderCardItems(type);
          }
        };

        stars.appendChild(star);
      }

      content.appendChild(stars);
    }

    if (type !== "beer") {
      content.appendChild(linkInput);
    }

    content.appendChild(comment);

    addDblClickEdit(div, () => openCardEdit(type, item.id));

    header.appendChild(content);
    div.appendChild(header);

    config.listElement.appendChild(div);
  });
}

function parseBeerRatingInput(value) {
  const cleaned = String(value || "").trim();

  if (!cleaned) {
    return 0;
  }

  const rating = Number(cleaned.replace(",", "."));

  if (!Number.isFinite(rating)) {
    return null;
  }

  const roundedRating = Math.round(rating * 10) / 10;

  if (roundedRating < 1 || roundedRating > 6) {
    return null;
  }

  return roundedRating;
}

function formatBeerGrade(value) {
  return Number(value).toFixed(1).replace(".", ",");
}

function getBeerGradeText(value) {
  const rating = Number(value || 0);

  if (rating === 0) return "Noch nicht bewertet";
  if (rating <= 1.3) return "Sehr gut";
  if (rating <= 1.7) return "Sehr gut minus";
  if (rating <= 2.3) return "Gut";
  if (rating <= 2.7) return "Gut minus";
  if (rating <= 3.3) return "Befriedigend";
  if (rating <= 3.7) return "Befriedigend minus";
  if (rating <= 4.3) return "Ausreichend";
  if (rating <= 4.7) return "Ausreichend minus";
  if (rating <= 5.3) return "Mangelhaft";
  if (rating <= 5.7) return "Mangelhaft minus";

  return "Ungenießbar";
}

function createBeerGradeSlider(item, type) {
  const wrapper = document.createElement("div");
  wrapper.className = "beer-grade-wrapper";

  const label = document.createElement("div");
  label.className = "beer-grade-label";

  const inputs = document.createElement("div");
  inputs.className = "beer-grade-inputs";

  const slider = document.createElement("input");
  slider.type = "range";
  slider.min = "1";
  slider.max = "6";
  slider.step = "0.1";
  slider.className = "beer-grade-slider";

  const numberInput = document.createElement("input");
  numberInput.type = "text";
  numberInput.inputMode = "decimal";
  numberInput.className = "beer-grade-number";
  numberInput.placeholder = "Note";

  const scale = document.createElement("div");
  scale.className = "beer-grade-scale-labels";
  scale.innerHTML = `
    <span>1,0<br>Sehr gut</span>
    <span>2,0<br>Gut</span>
    <span>3,0<br>Befr.</span>
    <span>4,0<br>Ausreich.</span>
    <span>5,0<br>Mangelh.</span>
    <span>6,0<br>Nein</span>
  `;

  function updateDisplay(value) {
    const rating = Number(value || 0);

    if (rating > 0) {
      label.textContent =
        "Bewertung: " +
        formatBeerGrade(rating) +
        " – " +
        getBeerGradeText(rating);

      numberInput.value = formatBeerGrade(rating);
      slider.value = rating;
    } else {
      label.textContent = "Noch nicht bewertet";
      numberInput.value = "";
      slider.value = "3";
    }
  }

  const saveGradeDebounced = debounce(async value => {
    await updateCardItem(
      type,
      item.id,
      { rating: value },
      "Fehler beim Speichern der Bier-Bewertung"
    );
  }, 500);

  function setRating(rawValue, shouldSave = true) {
    const rating = parseBeerRatingInput(rawValue);

    if (rating === null || rating === 0) {
      return;
    }

    item.rating = rating;
    updateDisplay(rating);

    if (shouldSave) {
      saveGradeDebounced(rating);
    }
  }

  slider.addEventListener("input", () => {
    setRating(slider.value);
  });

  numberInput.addEventListener("change", () => {
    setRating(numberInput.value);
  });

  const currentRating = Number(item.rating || 0);
  updateDisplay(currentRating);

  inputs.appendChild(slider);
  inputs.appendChild(numberInput);

  wrapper.appendChild(label);
  wrapper.appendChild(inputs);
  wrapper.appendChild(scale);

  return wrapper;
}


function createCardButton(text, className) {
  const btn = document.createElement("div");
  btn.className = className;
  btn.textContent = text;
  return btn;
}

function openRandomUnratedCard(type) {
  const config = cardLists[type];

  if (!config || !Array.isArray(config.items)) {
    showRandomPopup("Die Liste wurde noch nicht geladen.");
    return;
  }

  const candidates = config.items.filter(function(item) {
    const rating = Number(item.rating || 0);
    const hasNoRating = rating === 0;

    const hasValidUrl =
      item.url &&
      item.url.trim() !== "";

    return hasNoRating && hasValidUrl;
  });

  if (candidates.length === 0) {
    showRandomPopup("Es gibt keinen unbewerteten Eintrag mit hinterlegtem Link.");
    return;
  }

  const randomIndex = Math.floor(Math.random() * candidates.length);
  const selectedItem = candidates[randomIndex];

  const selectedName = selectedItem.name || "etwas Unbekanntes";
  const selectedUrl = normalize(selectedItem.url.trim());

  showRandomPopup(config.randomTextPrefix + " " + selectedName + "!", selectedUrl);
}

async function addCardItem(type) {
  if (!currentUser) {
    showLogin();
    return;
  }

  const config = cardLists[type];
  const name = config.nameInput.value.trim();

  if (!name) {
    alert("Bitte einen Namen eingeben.");
    return;
  }

  let url = "";
  let rating = 0;

  if (type === "beer") {
    rating = parseBeerRatingInput(config.ratingInput.value);

    if (rating === null) {
      alert("Bitte eine gültige Bier-Bewertung zwischen 1,0 und 6,0 eingeben oder das Feld leer lassen.");
      return;
    }
  } else {
    url = normalize(config.urlInput.value.trim());
  }

  const newItem = {
    name,
    url,
    rating,
    image: "",
    comment: "",
    user_id: currentUser.id
  };

  const { data, error } = await supabaseClient
    .from(config.table)
    .insert(newItem)
    .select("id, name, url, rating, image, comment, user_id, created_at")
    .single();

  if (error) {
    showSupabaseError("Fehler beim Hinzufügen", error);
    return;
  }

  config.nameInput.value = "";

  if (type === "beer") {
    config.ratingInput.value = "";
  } else {
    config.urlInput.value = "";
  }

  if (data) {
    config.items.unshift(data);
    renderCardItems(type);

    if (url) {
      autoImage(type, url, data.id);
    }
  } else {
    await loadCardItems(type);
  }
}




/* Spiele */

function getGameCheckKey(gameId, columnId) {
  return gameId + "|" + columnId;
}

async function loadGamesData() {
  if (!currentUser) {
    showLogin();
    return;
  }

  setStatus("Lade Spiele...");

  const [itemsResult, columnsResult, checksResult] = await Promise.all([
    supabaseClient
      .from("game_items")
      .select("id, name, url, image, user_id, created_at")
      .order("created_at", { ascending: false }),

    supabaseClient
      .from("game_columns")
      .select("id, name, position, user_id, created_at")
      .order("position", { ascending: true })
      .order("created_at", { ascending: true }),

    supabaseClient
      .from("game_checks")
      .select("id, game_id, column_id, checked, user_id, created_at")
  ]);

  if (itemsResult.error) {
    setStatus("Fehler beim Laden der Spiele.", true);
    showSupabaseError("Fehler beim Laden der Spiele", itemsResult.error);
    return;
  }

  if (columnsResult.error) {
    setStatus("Fehler beim Laden der Spiele-Spalten.", true);
    showSupabaseError("Fehler beim Laden der Spiele-Spalten", columnsResult.error);
    return;
  }

  if (checksResult.error) {
    setStatus("Fehler beim Laden der Spiele-Haken.", true);
    showSupabaseError("Fehler beim Laden der Spiele-Haken", checksResult.error);
    return;
  }

  gameItems = itemsResult.data || [];
  gameColumns = columnsResult.data || [];
  gameChecks = {};

  (checksResult.data || []).forEach(check => {
    gameChecks[getGameCheckKey(check.game_id, check.column_id)] = {
      id: check.id,
      checked: check.checked === true
    };
  });

  setStatus("");
  renderGamesTable();
}

function getGameCheckedCount(item) {
  return gameColumns.reduce((count, column) => {
    const key = getGameCheckKey(item.id, column.id);
    return count + (gameChecks[key]?.checked === true ? 1 : 0);
  }, 0);
}

function isGameComplete(item) {
  return gameColumns.length > 0 && getGameCheckedCount(item) === gameColumns.length;
}

function getFilteredSortedGameItems() {
  let data = [...gameItems];

  const filter = gamesCheckFilterSelect ? gamesCheckFilterSelect.value : "all";
  const sort = gamesCheckSortSelect ? gamesCheckSortSelect.value : "none";

  data = data.filter(item => {
    const checkedCount = getGameCheckedCount(item);
    const complete = gameColumns.length > 0 && checkedCount === gameColumns.length;

    if (filter === "complete") return complete;
    if (filter === "incomplete") return !complete;
    if (filter === "noneChecked") return checkedCount === 0;
    if (filter === "someChecked") return checkedCount > 0;

    return true;
  });

  if (sort === "checkedAsc") {
    data.sort((a, b) => getGameCheckedCount(a) - getGameCheckedCount(b));
  } else if (sort === "checkedDesc") {
    data.sort((a, b) => getGameCheckedCount(b) - getGameCheckedCount(a));
  } else if (sort === "completeFirst") {
    data.sort((a, b) => Number(isGameComplete(b)) - Number(isGameComplete(a)));
  } else if (sort === "incompleteFirst") {
    data.sort((a, b) => Number(isGameComplete(a)) - Number(isGameComplete(b)));
  }

  return data;
}

function renderGamesTable() {
  gamesTableWrapper.innerHTML = "";

  if (gameItems.length === 0 && gameColumns.length === 0) {
    const empty = document.createElement("div");
    empty.className = "games-empty";
    empty.textContent = "Noch keine Spiele und noch keine Spalten vorhanden.";
    gamesTableWrapper.appendChild(empty);
    return;
  }

  const table = document.createElement("table");
  table.className = "games-table games-desktop-table";

  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");

  const gameHead = document.createElement("th");
  gameHead.textContent = "Spiel";
  headRow.appendChild(gameHead);

  gameColumns.forEach((column) => {
    const th = document.createElement("th");
    th.dataset.columnId = column.id;

    const headerWrap = document.createElement("div");
    headerWrap.className = "game-column-header";
    headerWrap.draggable = true;
    headerWrap.dataset.columnId = column.id;
    headerWrap.title = "Spalte ziehen, um sie zu verschieben";

    const handle = document.createElement("div");
    handle.className = "game-column-drag-handle";
    handle.textContent = "☰";

    const title = document.createElement("div");
    title.className = "game-column-title";
    title.textContent = column.name || "Spalte";
    title.title = "Doppelklick zum Bearbeiten";

    title.addEventListener("dblclick", event => {
      event.preventDefault();
      event.stopPropagation();
      openGameColumnEdit(column.id);
    });

    headerWrap.addEventListener("dragstart", event => {
      draggedGameColumnId = column.id;
      headerWrap.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", column.id);
    });

    headerWrap.addEventListener("dragend", () => {
      draggedGameColumnId = null;
      clearGameColumnDragStyles();
    });

    headerWrap.addEventListener("dragover", event => {
      event.preventDefault();

      if (draggedGameColumnId && draggedGameColumnId !== column.id) {
        event.dataTransfer.dropEffect = "move";
        clearGameColumnDragOverStyles();
        headerWrap.classList.add("drag-over");
      }
    });

    headerWrap.addEventListener("dragleave", () => {
      headerWrap.classList.remove("drag-over");
    });

    headerWrap.addEventListener("drop", async event => {
      event.preventDefault();

      const sourceColumnId =
        draggedGameColumnId ||
        event.dataTransfer.getData("text/plain");

      await reorderGameColumnByDrop(sourceColumnId, column.id);

      draggedGameColumnId = null;
      clearGameColumnDragStyles();
    });

    headerWrap.addEventListener("touchstart", event => {
      touchDraggedGameColumnId = column.id;
      touchCurrentGameColumnId = column.id;
      headerWrap.classList.add("dragging");
    }, { passive: true });

    headerWrap.addEventListener("touchmove", event => {
      if (!touchDraggedGameColumnId) return;

      const touch = event.touches[0];
      const targetHeader = getGameColumnHeaderFromPoint(touch.clientX, touch.clientY);

      clearGameColumnDragOverStyles();

      if (targetHeader && targetHeader.dataset.columnId !== touchDraggedGameColumnId) {
        touchCurrentGameColumnId = targetHeader.dataset.columnId;
        targetHeader.classList.add("drag-over");
      }
    }, { passive: true });

    headerWrap.addEventListener("touchend", async () => {
      const sourceColumnId = touchDraggedGameColumnId;
      const targetColumnId = touchCurrentGameColumnId;

      touchDraggedGameColumnId = null;
      touchCurrentGameColumnId = null;

      await reorderGameColumnByDrop(sourceColumnId, targetColumnId);
      clearGameColumnDragStyles();
    });

    headerWrap.appendChild(handle);
    headerWrap.appendChild(title);

    th.appendChild(headerWrap);
    headRow.appendChild(th);
  });

  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");

  if (gameItems.length === 0) {
    const row = document.createElement("tr");
    const cell = document.createElement("td");
    cell.colSpan = Math.max(1, gameColumns.length + 1);
    cell.className = "games-empty";
    cell.textContent = "Noch keine Spiele vorhanden.";
    row.appendChild(cell);
    tbody.appendChild(row);
  }

  const visibleGameItems = getFilteredSortedGameItems();

  if (gameItems.length > 0 && visibleGameItems.length === 0) {
    const row = document.createElement("tr");
    const cell = document.createElement("td");
    cell.colSpan = Math.max(1, gameColumns.length + 1);
    cell.className = "games-empty";
    cell.textContent = "Keine Spiele passen zum aktuellen Filter.";
    row.appendChild(cell);
    tbody.appendChild(row);
  }

  visibleGameItems.forEach(item => {
    const row = document.createElement("tr");

    const gameCell = document.createElement("td");

    const main = document.createElement("div");
    main.className = "game-row-main";

    const imageWrapper = document.createElement("div");
    imageWrapper.className = "game-image-wrapper";

    if (item.image) {
      const img = document.createElement("img");
      img.src = item.image;
      img.className = "game-image";
      img.alt = item.name ? "Vorschaubild von " + item.name : "Vorschaubild";
      img.title = item.url ? "Link öffnen" : "Bild öffnen";
      img.onclick = () => {
        if (item.url) {
          window.open(item.url, "_blank");
        } else {
          window.open(item.image, "_blank");
        }
      };
      imageWrapper.appendChild(img);
    } else {
      const placeholder = document.createElement("div");
      placeholder.className = "game-image-placeholder";
      placeholder.textContent = "🎮";
      placeholder.title = "Bild hochladen";
      placeholder.style.cursor = "pointer";
      placeholder.onclick = () => uploadGameImage(item.id);
      imageWrapper.appendChild(placeholder);
    }

    const info = document.createElement("div");
    info.className = "game-info";

    const name = document.createElement("div");
    name.className = "game-name";
    name.textContent = item.name || "Unbenannt";
    name.onclick = () => {
      if (item.url) {
        window.open(item.url, "_blank");
      }
    };

    info.appendChild(name);


    if (item.url) {
      const urlText = document.createElement("div");
      urlText.className = "game-url";
      urlText.textContent = item.url;
      info.appendChild(urlText);
    }

    const rowActions = document.createElement("div");
    rowActions.className = "game-row-actions";

    const editButton = document.createElement("button");
    editButton.className = "game-row-edit";
    editButton.type = "button";
    editButton.textContent = "✏️ Bearbeiten";
    editButton.onclick = () => openGameEdit(item.id);
    rowActions.appendChild(editButton);

    if (item.url) {
      const linkButton = document.createElement("button");
      linkButton.className = "game-row-link";
      linkButton.type = "button";
      linkButton.textContent = "🔗 Öffnen";
      linkButton.onclick = () => window.open(item.url, "_blank");
      rowActions.appendChild(linkButton);

    }

    const imageButton = document.createElement("button");
    imageButton.className = "game-row-image-upload";
    imageButton.type = "button";
    imageButton.textContent = item.image ? "🖼️ Bild ändern" : "🖼️ Bild hochladen";
    imageButton.onclick = () => uploadGameImage(item.id);
    rowActions.appendChild(imageButton);

    const deleteButton = document.createElement("button");
    deleteButton.className = "game-row-delete";
    deleteButton.type = "button";
    deleteButton.textContent = "❌ Löschen";
    deleteButton.onclick = () => deleteGameItem(item.id, item.name || "Unbenannt");
    rowActions.appendChild(deleteButton);

    info.appendChild(rowActions);

    main.appendChild(imageWrapper);
    main.appendChild(info);
    addDblClickEdit(row, () => openGameEdit(item.id));

    gameCell.appendChild(main);
    row.appendChild(gameCell);

    gameColumns.forEach(column => {
      const cell = document.createElement("td");
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.className = "game-check";

      const key = getGameCheckKey(item.id, column.id);
      checkbox.checked = gameChecks[key]?.checked === true;

      checkbox.addEventListener("change", async () => {
        const newValue = checkbox.checked;
        const success = await updateGameCheck(item.id, column.id, newValue);

        if (!success) {
          checkbox.checked = !newValue;
          return;
        }

        renderGamesTable();
      });

      cell.appendChild(checkbox);
      row.appendChild(cell);
    });

    tbody.appendChild(row);
  });

  table.appendChild(tbody);
  gamesTableWrapper.appendChild(table);

  const mobileList = document.createElement("div");
  mobileList.className = "games-mobile-list";

  if (gameItems.length === 0) {
    const empty = document.createElement("div");
    empty.className = "games-empty";
    empty.textContent = "Noch keine Spiele vorhanden.";
    mobileList.appendChild(empty);
  } else if (visibleGameItems.length === 0) {
    const empty = document.createElement("div");
    empty.className = "games-empty";
    empty.textContent = "Keine Spiele passen zum aktuellen Filter.";
    mobileList.appendChild(empty);
  } else {
    visibleGameItems.forEach(item => {
      const card = document.createElement("div");
      card.className = "game-mobile-card";
      addDblClickEdit(card, () => openGameEdit(item.id));

      const main = document.createElement("div");
      main.className = "game-row-main";

      const imageWrapper = document.createElement("div");
      imageWrapper.className = "game-image-wrapper";

      if (item.image) {
        const img = document.createElement("img");
        img.src = item.image;
        img.className = "game-image";
        img.alt = item.name ? "Vorschaubild von " + item.name : "Vorschaubild";
        img.title = item.url ? "Link öffnen" : "Bild öffnen";
        img.onclick = () => {
          if (item.url) {
            window.open(item.url, "_blank");
          } else {
            window.open(item.image, "_blank");
          }
        };
        imageWrapper.appendChild(img);
      } else {
        const placeholder = document.createElement("div");
        placeholder.className = "game-image-placeholder";
        placeholder.textContent = "🎮";
        placeholder.title = "Bild hochladen";
        placeholder.style.cursor = "pointer";
        placeholder.onclick = () => uploadGameImage(item.id);
        imageWrapper.appendChild(placeholder);
      }

      const info = document.createElement("div");
      info.className = "game-info";

      const name = document.createElement("div");
      name.className = "game-name";
      name.textContent = item.name || "Unbenannt";
      name.onclick = () => {
        if (item.url) {
          window.open(item.url, "_blank");
        }
      };

      info.appendChild(name);

      if (item.url) {
        const urlText = document.createElement("div");
        urlText.className = "game-url";
        urlText.textContent = item.url;
        info.appendChild(urlText);
      }

      const rowActions = document.createElement("div");
      rowActions.className = "game-row-actions";

      const editButton = document.createElement("button");
      editButton.className = "game-row-edit";
      editButton.type = "button";
      editButton.textContent = "✏️ Bearbeiten";
      editButton.onclick = () => openGameEdit(item.id);
      rowActions.appendChild(editButton);

      if (item.url) {
        const linkButton = document.createElement("button");
        linkButton.className = "game-row-link";
        linkButton.type = "button";
        linkButton.textContent = "🔗 Öffnen";
        linkButton.onclick = () => window.open(item.url, "_blank");
        rowActions.appendChild(linkButton);
      }

      const imageButton = document.createElement("button");
      imageButton.className = "game-row-image-upload";
      imageButton.type = "button";
      imageButton.textContent = item.image ? "🖼️ Bild ändern" : "🖼️ Bild hochladen";
      imageButton.onclick = () => uploadGameImage(item.id);
      rowActions.appendChild(imageButton);

      const deleteButton = document.createElement("button");
      deleteButton.className = "game-row-delete";
      deleteButton.type = "button";
      deleteButton.textContent = "❌ Löschen";
      deleteButton.onclick = () => deleteGameItem(item.id, item.name || "Unbenannt");
      rowActions.appendChild(deleteButton);

      info.appendChild(rowActions);
      main.appendChild(imageWrapper);
      main.appendChild(info);
      card.appendChild(main);

      if (gameColumns.length === 0) {
        const noColumns = document.createElement("div");
        noColumns.className = "game-mobile-no-columns";
        noColumns.textContent = "Noch keine Spalten vorhanden.";
        card.appendChild(noColumns);
      } else {
        const checks = document.createElement("div");
        checks.className = "game-mobile-checks";

        gameColumns.forEach(column => {
          const label = document.createElement("label");
          label.className = "game-mobile-check-row";

          const title = document.createElement("span");
          title.className = "game-mobile-check-title";
          title.textContent = column.name || "Spalte";
          title.title = column.name || "Spalte";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.className = "game-check";

          const key = getGameCheckKey(item.id, column.id);
          checkbox.checked = gameChecks[key]?.checked === true;

          checkbox.addEventListener("change", async () => {
            const newValue = checkbox.checked;
            const success = await updateGameCheck(item.id, column.id, newValue);

            if (!success) {
              checkbox.checked = !newValue;
              return;
            }

            renderGamesTable();
          });

          label.appendChild(title);
          label.appendChild(checkbox);
          checks.appendChild(label);
        });

        card.appendChild(checks);
      }

      mobileList.appendChild(card);
    });
  }

  gamesTableWrapper.appendChild(mobileList);
}

async function addGameColumn() {
  if (!currentUser) {
    showLogin();
    return;
  }

  const name = newGameColumnNameInput.value.trim();

  if (!name) {
    alert("Bitte einen Spaltennamen eingeben.");
    return;
  }

  const maxPosition = gameColumns.reduce((max, column) => {
    return Math.max(max, Number(column.position || 0));
  }, 0);

  const newColumn = {
    name,
    position: maxPosition + 1,
    user_id: currentUser.id
  };

  const { data, error } = await supabaseClient
    .from("game_columns")
    .insert(newColumn)
    .select("id, name, position, user_id, created_at")
    .single();

  if (error) {
    showSupabaseError("Fehler beim Hinzufügen der Spalte", error);
    return;
  }

  newGameColumnNameInput.value = "";

  if (data) {
    gameColumns.push(data);
    gameColumns.sort((a, b) => Number(a.position || 0) - Number(b.position || 0));
    renderGamesTable();
  } else {
    await loadGamesData();
  }
}

async function saveGameColumnPositions() {
  const updates = gameColumns.map((column, index) => {
    const newPosition = index + 1;
    column.position = newPosition;

    return supabaseClient
      .from("game_columns")
      .update({ position: newPosition })
      .eq("id", column.id);
  });

  const results = await Promise.all(updates);
  const failedResult = results.find(result => result.error);

  if (failedResult) {
    showSupabaseError("Fehler beim Speichern der Spalten-Reihenfolge", failedResult.error);
    await loadGamesData();
    return false;
  }

  return true;
}

function clearGameColumnDragOverStyles() {
  document.querySelectorAll(".game-column-header.drag-over").forEach(element => {
    element.classList.remove("drag-over");
  });
}

function clearGameColumnDragStyles() {
  document.querySelectorAll(".game-column-header.dragging, .game-column-header.drag-over").forEach(element => {
    element.classList.remove("dragging", "drag-over");
  });
}

function getGameColumnHeaderFromPoint(x, y) {
  const element = document.elementFromPoint(x, y);

  if (!element) return null;

  return element.closest(".game-column-header");
}

async function reorderGameColumnByDrop(sourceColumnId, targetColumnId) {
  if (!sourceColumnId || !targetColumnId || sourceColumnId === targetColumnId) {
    return;
  }

  const sourceIndex = gameColumns.findIndex(column => column.id === sourceColumnId);
  const targetIndex = gameColumns.findIndex(column => column.id === targetColumnId);

  if (sourceIndex < 0 || targetIndex < 0) {
    return;
  }

  const previousColumns = [...gameColumns];

  const [movedColumn] = gameColumns.splice(sourceIndex, 1);
  gameColumns.splice(targetIndex, 0, movedColumn);

  renderGamesTable();

  const success = await saveGameColumnPositions();

  if (!success) {
    gameColumns = previousColumns;
    renderGamesTable();
  }
}


async function addGameItem() {
  if (!currentUser) {
    showLogin();
    return;
  }

  const name = newGameNameInput.value.trim();
  const url = normalize(newGameUrlInput.value.trim());

  if (!name) {
    alert("Bitte einen Namen eingeben.");
    return;
  }

  const newItem = {
    name,
    url,
    image: "",
    user_id: currentUser.id
  };

  const { data, error } = await supabaseClient
    .from("game_items")
    .insert(newItem)
    .select("id, name, url, image, user_id, created_at")
    .single();

  if (error) {
    showSupabaseError("Fehler beim Hinzufügen des Spiels", error);
    return;
  }

  newGameNameInput.value = "";
  newGameUrlInput.value = "";

  if (data) {
    gameItems.unshift(data);
    renderGamesTable();

    if (url) {
      autoGameMeta(url, data.id);
    }
  } else {
    await loadGamesData();
  }
}

async function uploadGameImage(itemId) {
  const item = gameItems.find(entry => entry.id === itemId);

  if (!item) {
    showRandomPopup("Der Spieleintrag wurde nicht gefunden.");
    return;
  }

  const fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.accept = "image/*";

  fileInput.onchange = event => {
    const selectedFile = event.target.files[0];

    if (!selectedFile) return;

    compressImage(selectedFile, async compressed => {
      if (!compressed) {
        alert("Bild konnte nicht verarbeitet werden.");
        return;
      }

      item.image = compressed;

      const { error } = await supabaseClient
        .from("game_items")
        .update({ image: compressed })
        .eq("id", item.id);

      if (error) {
        showSupabaseError("Fehler beim Speichern des Spiele-Bildes", error);
        return;
      }

      renderGamesTable();
    });
  };

  fileInput.click();
}

async function deleteGameItem(itemId, itemName) {
  if (!confirm('Spiel "' + itemName + '" wirklich löschen?')) {
    return;
  }

  const { error } = await supabaseClient
    .from("game_items")
    .delete()
    .eq("id", itemId);

  if (error) {
    showSupabaseError("Fehler beim Löschen des Spiels", error);
    return;
  }

  gameItems = gameItems.filter(item => item.id !== itemId);

  Object.keys(gameChecks).forEach(key => {
    if (key.startsWith(itemId + "|")) {
      delete gameChecks[key];
    }
  });

  renderGamesTable();
}


async function updateGameCheck(gameId, columnId, checked) {
  const key = getGameCheckKey(gameId, columnId);

  const { data, error } = await supabaseClient
    .from("game_checks")
    .upsert(
      {
        game_id: gameId,
        column_id: columnId,
        checked,
        user_id: currentUser.id
      },
      { onConflict: "game_id,column_id" }
    )
    .select("id, game_id, column_id, checked")
    .single();

  if (error) {
    showSupabaseError("Fehler beim Speichern des Hakens", error);
    return false;
  }

  if (data) {
    gameChecks[key] = {
      id: data.id,
      checked: data.checked === true
    };
  } else {
    gameChecks[key] = {
      id: gameChecks[key]?.id || "",
      checked
    };
  }

  return true;
}

function autoGameMeta(url, itemId) {
  if (!url) return Promise.resolve(false);

  const api =
    "https://api.microlink.io/?url=" + encodeURIComponent(url);

  return fetch(api)
    .then(response => response.json())
    .then(data => {
      const imageUrl =
        data?.data?.image?.url ||
        new URL(url).origin + "/favicon.ico";

      return new Promise(resolve => {
        compressImage(imageUrl, async compressed => {
          if (!compressed) {
            resolve(false);
            return;
          }

          const item = gameItems.find(entry => entry.id === itemId);

          if (!item || item.image) {
            resolve(false);
            return;
          }

          item.image = compressed;

          const { error } = await supabaseClient
            .from("game_items")
            .update({ image: compressed })
            .eq("id", item.id);

          if (error) {
            showSupabaseError("Fehler beim Speichern des Spiele-Bildes", error);
            resolve(false);
            return;
          }

          renderGamesTable();
          resolve(true);
        });
      });
    })
    .catch(error => {
      console.warn("Automatisches Spiele-Bild konnte nicht geladen werden:", error);
      return false;
    });
}


/* Yu-Gi-Oh!-Decks */

async function loadYugiohDecks() {
  if (!currentUser) {
    showLogin();
    return;
  }

  setStatus("Lade Yu-Gi-Oh!-Decks...");

  const { data, error } = await supabaseClient
    .from("yugioh_decks")
    .select("id, theme, sleeve_color, owner, image, user_id, created_at")
    .order("theme", { ascending: true });

  if (error) {
    setStatus("Fehler beim Laden der Yu-Gi-Oh!-Decks.", true);
    showSupabaseError("Fehler beim Laden der Yu-Gi-Oh!-Decks", error);
    return;
  }

  yugiohDecks = data || [];

  setStatus("");
  renderYugiohDecks();
}

function renderYugiohDecks() {
  yugiohDeckList.innerHTML = "";

  if (!Array.isArray(yugiohDecks) || yugiohDecks.length === 0) {
    const empty = document.createElement("div");
    empty.className = "yugioh-empty";
    empty.textContent = "Noch keine Yu-Gi-Oh!-Decks vorhanden.";
    yugiohDeckList.appendChild(empty);
    return;
  }

  yugiohDecks.forEach(deck => {
    const card = document.createElement("div");
    card.className = "yugioh-deck-card";

    const main = document.createElement("div");
    main.className = "yugioh-deck-main";

    const imageWrapper = document.createElement("div");
    imageWrapper.className = "yugioh-image-wrapper";

    if (deck.image) {
      const img = document.createElement("img");
      img.src = deck.image;
      img.className = "yugioh-image";
      img.alt = deck.theme ? "Bild von " + deck.theme : "Deckbild";
      img.title = "Bild öffnen";
      img.onclick = () => window.open(deck.image, "_blank");
      imageWrapper.appendChild(img);
    } else {
      const placeholder = document.createElement("div");
      placeholder.className = "yugioh-image-placeholder";
      placeholder.textContent = "🃏";
      placeholder.title = "Bild hochladen";
      placeholder.onclick = () => uploadYugiohImage(deck.id);
      imageWrapper.appendChild(placeholder);
    }

    const info = document.createElement("div");
    info.className = "yugioh-info";

    const theme = document.createElement("div");
    theme.className = "yugioh-theme";
    theme.textContent = deck.theme || "Unbenanntes Deck";

    const sleeve = document.createElement("div");
    sleeve.className = "yugioh-meta";
    sleeve.textContent = "Hüllenfarbe: " + (deck.sleeve_color || "nicht angegeben");

    const owner = document.createElement("div");
    owner.className = "yugioh-meta";
    owner.textContent = "Besitzer: " + (deck.owner || "nicht angegeben");

    const actions = document.createElement("div");
    actions.className = "yugioh-actions";

    const editButton = document.createElement("button");
    editButton.type = "button";
    editButton.className = "yugioh-edit-button";
    editButton.textContent = "✏️ Bearbeiten";
    editButton.onclick = () => openYugiohEdit(deck.id);

    const imageButton = document.createElement("button");
    imageButton.type = "button";
    imageButton.className = "yugioh-image-button";
    imageButton.textContent = deck.image ? "🖼️ Bild ändern" : "🖼️ Bild hochladen";
    imageButton.onclick = () => uploadYugiohImage(deck.id);

    const deleteButton = document.createElement("button");
    deleteButton.type = "button";
    deleteButton.className = "yugioh-delete-button";
    deleteButton.textContent = "❌ Löschen";
    deleteButton.onclick = () => deleteYugiohDeck(deck.id, deck.theme || "Unbenanntes Deck");

    actions.appendChild(editButton);
    actions.appendChild(imageButton);
    actions.appendChild(deleteButton);

    info.appendChild(theme);
    info.appendChild(sleeve);
    info.appendChild(owner);
    info.appendChild(actions);

    addDblClickEdit(card, () => openYugiohEdit(deck.id));

    main.appendChild(imageWrapper);
    main.appendChild(info);
    card.appendChild(main);

    yugiohDeckList.appendChild(card);
  });
}

function parseYugiohPlayerCount() {
  const value = Number(yugiohPlayerCountInput.value || 0);

  if (!Number.isFinite(value) || value < 1) {
    return 1;
  }

  return Math.min(Math.floor(value), 20);
}

function renderYugiohPlayerInputs() {
  const count = parseYugiohPlayerCount();

  yugiohPlayerCountInput.value = count;

  const currentValues = Array.from(
    yugiohPlayerInputs.querySelectorAll("input")
  ).map(input => input.value.trim());

  yugiohPlayerInputs.innerHTML = "";

  for (let index = 0; index < count; index++) {
    const input = document.createElement("input");
    input.placeholder = "Spieler " + (index + 1);
    input.value = currentValues[index] || yugiohPlayerNames[index] || "";

    input.addEventListener("input", () => {
      yugiohPlayerNames[index] = input.value.trim();
    });

    yugiohPlayerInputs.appendChild(input);
  }
}

function getYugiohPlayerNames() {
  return Array.from(yugiohPlayerInputs.querySelectorAll("input"))
    .map((input, index) => input.value.trim() || "Spieler " + (index + 1));
}

function assignRandomYugiohDecks() {
  renderYugiohPlayerInputs();

  const players = getYugiohPlayerNames();

  if (players.length === 0) {
    showRandomPopup("Bitte mindestens einen Spieler eintragen.");
    return;
  }

  if (!Array.isArray(yugiohDecks) || yugiohDecks.length === 0) {
    showRandomPopup("Es sind noch keine Yu-Gi-Oh!-Decks vorhanden.");
    return;
  }

  if (players.length > yugiohDecks.length) {
    showRandomPopup("Es gibt weniger Decks als Spieler.");
    return;
  }

  const shuffledDecks = [...yugiohDecks]
    .sort(() => Math.random() - 0.5);

  const assignments = players.map((playerName, index) => {
    return {
      playerName,
      deck: shuffledDecks[index]
    };
  });

  yugiohAssignmentResults.innerHTML = "";
  showYugiohAssignmentPopup(assignments);
}

async function addYugiohDeck() {
  if (!currentUser) {
    showLogin();
    return;
  }

  const theme = newYugiohThemeInput.value.trim();
  const sleeveColor = newYugiohSleeveColorInput.value.trim();
  const owner = newYugiohOwnerInput.value.trim();

  if (!theme) {
    alert("Bitte ein Thema / einen Decknamen eingeben.");
    return;
  }

  const newDeck = {
    theme,
    sleeve_color: sleeveColor,
    owner,
    image: "",
    user_id: currentUser.id
  };

  const { data, error } = await supabaseClient
    .from("yugioh_decks")
    .insert(newDeck)
    .select("id, theme, sleeve_color, owner, image, user_id, created_at")
    .single();

  if (error) {
    showSupabaseError("Fehler beim Hinzufügen des Yu-Gi-Oh!-Decks", error);
    return;
  }

  newYugiohThemeInput.value = "";
  newYugiohSleeveColorInput.value = "";
  newYugiohOwnerInput.value = "";

  if (data) {
    yugiohDecks.push(data);
    yugiohDecks.sort((a, b) => {
      return (a.theme || "").localeCompare(b.theme || "", "de");
    });
    renderYugiohDecks();
  } else {
    await loadYugiohDecks();
  }
}

async function uploadYugiohImage(deckId) {
  const deck = yugiohDecks.find(entry => entry.id === deckId);

  if (!deck) {
    showRandomPopup("Das Deck wurde nicht gefunden.");
    return;
  }

  const fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.accept = "image/*";

  fileInput.onchange = event => {
    const selectedFile = event.target.files[0];

    if (!selectedFile) return;

    compressImage(selectedFile, async compressed => {
      if (!compressed) {
        alert("Bild konnte nicht verarbeitet werden.");
        return;
      }

      deck.image = compressed;

      const { error } = await supabaseClient
        .from("yugioh_decks")
        .update({ image: compressed })
        .eq("id", deck.id);

      if (error) {
        showSupabaseError("Fehler beim Speichern des Deck-Bildes", error);
        return;
      }

      renderYugiohDecks();
    });
  };

  fileInput.click();
}

async function deleteYugiohDeck(deckId, deckName) {
  if (!confirm('Deck "' + deckName + '" wirklich löschen?')) {
    return;
  }

  const { error } = await supabaseClient
    .from("yugioh_decks")
    .delete()
    .eq("id", deckId);

  if (error) {
    showSupabaseError("Fehler beim Löschen des Yu-Gi-Oh!-Decks", error);
    return;
  }

  yugiohDecks = yugiohDecks.filter(deck => deck.id !== deckId);
  yugiohAssignmentResults.innerHTML = "";
  closeYugiohAssignmentPopup();
  renderYugiohDecks();
}
